<!DOCTYPE html>
<html>
<head>
    <title>ANOM P2P WORKING</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            padding: 15px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 10px;
        }
        
        .header h1 {
            font-size: 24px;
            letter-spacing: 3px;
        }
        
        .connection-panel {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .step {
            margin-bottom: 20px;
            padding: 15px;
            background: #0d1a0d;
            border-radius: 8px;
        }
        
        .step h3 {
            color: #00ff9d;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border-radius: 5px;
            margin: 5px 0;
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            margin: 5px 0;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        
        .btn-group button {
            flex: 1;
        }
        
        .status {
            background: #0d0d0d;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            margin: 10px 0;
        }
        
        .connected { border-color: #00ff9d; color: #00ff9d; }
        .connecting { border-color: #ffaa00; color: #ffaa00; }
        .error { border-color: #ff6b6b; color: #ff6b6b; }
        
        .chat-container {
            display: none;
        }
        
        .chat-container.active {
            display: block;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin: 20px 0;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px;
            background: #0d0d0d;
            border-left: 3px solid #00ff9d;
            border-radius: 0 5px 5px 0;
        }
        
        .message.own {
            border-left-color: #ff6b6b;
            background: #1a0d0d;
        }
        
        .message small {
            color: #666;
            font-size: 9px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            border-radius: 5px;
        }
        
        .input-group button {
            width: auto;
            padding: 12px 20px;
            margin: 0;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: auto;
            padding: 8px 15px;
            font-size: 11px;
        }
        
        @media (max-width: 480px) {
            .container { padding: 15px; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔵 ANOM P2P</h1>
            <button class="back-btn" id="backBtn" onclick="resetConnection()" style="display: none;">← НАЗАД</button>
        </div>
        
        <!-- Панель подключения -->
        <div id="connectionPanel" class="connection-panel">
            <div class="step">
                <h3>ШАГ 1: ВЫБЕРИТЕ РОЛЬ</h3>
                <div class="btn-group">
                    <button onclick="initHost()" id="hostBtn">🎮 СОЗДАТЬ КОМНАТУ</button>
                    <button onclick="initJoin()" id="joinBtn">👥 ПОДКЛЮЧИТЬСЯ</button>
                </div>
            </div>
            
            <div id="hostStep" style="display: none;">
                <div class="step">
                    <h3>ШАГ 2: ОТПРАВЬТЕ ЭТОТ КОД ДРУГУ</h3>
                    <textarea id="offerCode" readonly placeholder="Код появится здесь..."></textarea>
                    <button onclick="copyOffer()">📋 КОПИРОВАТЬ КОД</button>
                    <div class="status" id="hostStatus">⏳ Создание комнаты...</div>
                </div>
                
                <div class="step">
                    <h3>ШАГ 3: ВСТАВЬТЕ ОТВЕТ ДРУГА</h3>
                    <textarea id="answerInput" placeholder="Вставьте код ответа от друга..."></textarea>
                    <button onclick="connectWithAnswer()" id="connectBtn" disabled>🔗 ПОДКЛЮЧИТЬСЯ</button>
                </div>
            </div>
            
            <div id="joinStep" style="display: none;">
                <div class="step">
                    <h3>ШАГ 2: ВСТАВЬТЕ КОД КОМНАТЫ</h3>
                    <textarea id="offerInput" placeholder="Вставьте код от хоста..."></textarea>
                    <button onclick="sendAnswer()" id="answerBtn" disabled>📤 ОТПРАВИТЬ ОТВЕТ</button>
                    <div class="status" id="joinStatus">⏳ Ожидание кода...</div>
                </div>
            </div>
        </div>
        
        <!-- Чат -->
        <div id="chatContainer" class="chat-container">
            <div class="messages" id="messages"></div>
            
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="checkEnter(event)">
                <button onclick="sendMessage()">📨</button>
            </div>
            
            <div class="btn-group">
                <button onclick="selectFile()">📷 ФОТО</button>
                <button onclick="selectAnyFile()">📎 ФАЙЛ</button>
            </div>
            
            <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="handleFileSelect(event)">
            <input type="file" id="anyFileInput" style="display: none;" onchange="handleAnyFileSelect(event)">
            
            <div class="status" id="chatStatus">🔵 Ожидание подключения...</div>
        </div>
    </div>

    <script>
        // ========== ИСПРАВЛЕННОЕ P2P СОЕДИНЕНИЕ ==========
        let peerConnection = null;
        let dataChannel = null;
        let isHost = false;
        let username = 'user_' + Math.floor(Math.random() * 1000);
        let iceCandidates = [];
        let pendingCandidates = [];
        
        // STUN серверы для подключения из разных сетей
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 0, // Важно: 0 для ручного управления
            iceTransportPolicy: 'all',
            bundlePolicy: 'max-bundle'
        };
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function initHost() {
            isHost = true;
            document.getElementById('hostBtn').style.background = '#00ff9d';
            document.getElementById('hostBtn').style.color = '#000';
            document.getElementById('joinBtn').disabled = true;
            
            document.getElementById('hostStep').style.display = 'block';
            document.getElementById('joinStep').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            
            createOffer();
        }
        
        function initJoin() {
            isHost = false;
            document.getElementById('joinBtn').style.background = '#00ff9d';
            document.getElementById('joinBtn').style.color = '#000';
            document.getElementById('hostBtn').disabled = true;
            
            document.getElementById('joinStep').style.display = 'block';
            document.getElementById('hostStep').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            
            document.getElementById('joinStatus').innerHTML = '📋 Вставьте код от хоста';
        }
        
        // ========== ХОСТ: СОЗДАНИЕ OFFER ==========
        async function createOffer() {
            try {
                peerConnection = new RTCPeerConnection(config);
                
                // Создаем канал данных с правильными параметрами
                dataChannel = peerConnection.createDataChannel('chat', {
                    ordered: true,
                    maxRetransmits: 30
                });
                setupDataChannel(dataChannel);
                
                // Сбрасываем кандидаты
                iceCandidates = [];
                
                // Собираем ICE кандидаты
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        console.log('ICE candidate:', event.candidate.candidate);
                        iceCandidates.push(event.candidate);
                        
                        // Обновляем статус
                        document.getElementById('hostStatus').innerHTML = `📡 Собрано кандидатов: ${iceCandidates.length}`;
                    }
                };
                
                peerConnection.onicegatheringstatechange = () => {
                    console.log('ICE gathering state:', peerConnection.iceGatheringState);
                    if (peerConnection.iceGatheringState === 'complete') {
                        document.getElementById('hostStatus').innerHTML = `✅ Код создан! Кандидатов: ${iceCandidates.length}`;
                    }
                };
                
                // Создаем offer
                const offer = await peerConnection.createOffer({
                    offerToReceiveAudio: false,
                    offerToReceiveVideo: false
                });
                
                await peerConnection.setLocalDescription(offer);
                
                // Ждем немного для сбора ICE кандидатов
                setTimeout(() => {
                    if (peerConnection && peerConnection.localDescription) {
                        // Формируем полный код с кандидатами
                        const offerData = {
                            type: 'offer',
                            sdp: peerConnection.localDescription.sdp,
                            candidates: iceCandidates
                        };
                        
                        try {
                            const offerCode = btoa(JSON.stringify(offerData));
                            document.getElementById('offerCode').value = offerCode;
                            document.getElementById('hostStatus').innerHTML = '✅ Код создан! Отправьте его другу';
                            document.getElementById('connectBtn').disabled = false;
                        } catch (e) {
                            console.error('Encoding error:', e);
                            document.getElementById('hostStatus').innerHTML = '❌ Ошибка кодирования';
                        }
                    }
                }, 3000); // Увеличил время для сбора кандидатов
                
            } catch (error) {
                console.error('Offer error:', error);
                document.getElementById('hostStatus').innerHTML = '❌ Ошибка: ' + error.message;
            }
        }
        
        // ========== ХОСТ: ПОДКЛЮЧЕНИЕ ПО ANSWER ==========
        async function connectWithAnswer() {
            try {
                const answerCode = document.getElementById('answerInput').value.trim();
                if (!answerCode) {
                    alert('Вставьте код ответа от друга');
                    return;
                }
                
                let answerData;
                try {
                    answerData = JSON.parse(atob(answerCode));
                } catch (e) {
                    alert('Неверный формат кода');
                    return;
                }
                
                // Проверяем, что это answer
                if (answerData.type !== 'answer') {
                    alert('Это не код ответа');
                    return;
                }
                
                document.getElementById('hostStatus').innerHTML = '🔄 Устанавливаем соединение...';
                
                // Устанавливаем удаленное описание
                await peerConnection.setRemoteDescription(answerData);
                
                // Добавляем ICE кандидаты с задержкой
                if (answerData.candidates && answerData.candidates.length > 0) {
                    for (const candidate of answerData.candidates) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                            console.log('Added candidate');
                        } catch (e) {
                            console.warn('Failed to add candidate:', e);
                        }
                    }
                }
                
                document.getElementById('hostStatus').innerHTML = '✅ Подключение установлено!';
                showChat();
                
            } catch (error) {
                console.error('Connection error:', error);
                document.getElementById('hostStatus').innerHTML = '❌ Ошибка: ' + error.message;
            }
        }
        
        // ========== УЧАСТНИК: ОТПРАВКА ANSWER ==========
        async function sendAnswer() {
            try {
                const offerCode = document.getElementById('offerInput').value.trim();
                if (!offerCode) {
                    alert('Вставьте код от хоста');
                    return;
                }
                
                let offerData;
                try {
                    offerData = JSON.parse(atob(offerCode));
                } catch (e) {
                    alert('Неверный формат кода');
                    return;
                }
                
                // Проверяем, что это offer
                if (offerData.type !== 'offer') {
                    alert('Это не код приглашения');
                    return;
                }
                
                document.getElementById('joinStatus').innerHTML = '🔄 Обработка...';
                
                peerConnection = new RTCPeerConnection(config);
                
                // Сбрасываем кандидаты
                iceCandidates = [];
                
                // Обработка входящего канала
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel(dataChannel);
                };
                
                // Собираем ICE кандидаты
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        console.log('ICE candidate:', event.candidate.candidate);
                        iceCandidates.push(event.candidate);
                        document.getElementById('joinStatus').innerHTML = `📡 Собрано кандидатов: ${iceCandidates.length}`;
                    }
                };
                
                // Устанавливаем удаленное описание
                await peerConnection.setRemoteDescription(offerData);
                
                // Добавляем ICE кандидаты от хоста
                if (offerData.candidates && offerData.candidates.length > 0) {
                    for (const candidate of offerData.candidates) {
                        try {
                            await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                        } catch (e) {
                            console.warn('Failed to add candidate:', e);
                        }
                    }
                }
                
                // Создаем ответ
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                // Ждем сбора кандидатов
                setTimeout(() => {
                    if (peerConnection && peerConnection.localDescription) {
                        // Формируем ответ с кандидатами
                        const answerData = {
                            type: 'answer',
                            sdp: peerConnection.localDescription.sdp,
                            candidates: iceCandidates
                        };
                        
                        try {
                            const answerCode = btoa(JSON.stringify(answerData));
                            
                            // Показываем код для отправки хосту
                            document.getElementById('offerInput').value = answerCode;
                            document.getElementById('joinStatus').innerHTML = '✅ Код ответа создан! Отправьте его хосту';
                            
                            // Автоматически копируем в буфер
                            navigator.clipboard.writeText(answerCode).then(() => {
                                alert('📋 Код скопирован! Отправьте его хосту');
                            }).catch(() => {
                                alert('Код готов, скопируйте его вручную');
                            });
                            
                        } catch (e) {
                            console.error('Encoding error:', e);
                            document.getElementById('joinStatus').innerHTML = '❌ Ошибка кодирования';
                        }
                    }
                }, 3000);
                
            } catch (error) {
                console.error('Answer error:', error);
                document.getElementById('joinStatus').innerHTML = '❌ Ошибка: ' + error.message;
            }
        }
        
        // ========== НАСТРОЙКА КАНАЛА ==========
        function setupDataChannel(channel) {
            channel.onopen = () => {
                console.log('Channel opened');
                addSystemMessage('✅ Подключено к собеседнику!');
                
                // Отправляем приветствие
                const msg = {
                    type: 'text',
                    user: username,
                    text: '👋 Привет! Я подключился',
                    time: Date.now()
                };
                channel.send(JSON.stringify(msg));
            };
            
            channel.onclose = () => {
                console.log('Channel closed');
                addSystemMessage('❌ Соединение закрыто');
                document.getElementById('chatStatus').innerHTML = '❌ Отключено';
            };
            
            channel.onerror = (error) => {
                console.error('Channel error:', error);
                addSystemMessage('⚠️ Ошибка канала');
            };
            
            channel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    displayMessage(data);
                } catch (e) {
                    console.error('Parse error:', e);
                }
            };
        }
        
        // ========== ЧАТ ==========
        function showChat() {
            document.getElementById('connectionPanel').style.display = 'none';
            document.getElementById('chatContainer').classList.add('active');
            document.getElementById('chatStatus').innerHTML = '✅ Подключено к пиру';
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            if (!dataChannel || dataChannel.readyState !== 'open') {
                alert('❌ Нет подключения к собеседнику');
                return;
            }
            
            const msg = {
                type: 'text',
                user: username,
                text: text,
                time: Date.now()
            };
            
            try {
                dataChannel.send(JSON.stringify(msg));
                displayMessage(msg);
                input.value = '';
            } catch (error) {
                console.error('Send error:', error);
                alert('Ошибка отправки');
            }
        }
        
        function displayMessage(msg) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            const time = new Date(msg.time).toLocaleTimeString();
            
            div.className = 'message' + (msg.user === username ? ' own' : '');
            
            if (msg.type === 'text') {
                div.innerHTML = `<strong>${escapeHtml(msg.user)}</strong> <small>${time}</small><br>${escapeHtml(msg.text)}`;
            } else if (msg.type === 'file') {
                div.innerHTML = `<strong>${escapeHtml(msg.user)}</strong> <small>${time}</small><br>
                    <a href="${msg.data}" download="${msg.name}" style="color:#00ff9d">
                        📎 ${escapeHtml(msg.name)} (${formatSize(msg.size)})
                    </a>`;
            } else if (msg.type === 'photo') {
                div.innerHTML = `<strong>${escapeHtml(msg.user)}</strong> <small>${time}</small><br>
                    <img src="${msg.data}" style="max-width:150px;max-height:150px;border:1px solid #00ff9d;border-radius:5px;">`;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.color = '#ffaa00';
            div.style.fontStyle = 'italic';
            div.style.padding = '10px';
            div.innerHTML = text;
            container.appendChild(div);
        }
        
        // ========== ФАЙЛЫ ==========
        function selectFile() {
            document.getElementById('fileInput').click();
        }
        
        function selectAnyFile() {
            document.getElementById('anyFileInput').click();
        }
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 10 * 1024 * 1024) {
                alert('Файл слишком большой (макс 10MB)');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const msg = {
                    type: 'photo',
                    user: username,
                    name: file.name,
                    size: file.size,
                    data: e.target.result,
                    time: Date.now()
                };
                
                if (dataChannel && dataChannel.readyState === 'open') {
                    dataChannel.send(JSON.stringify(msg));
                    displayMessage(msg);
                } else {
                    alert('Нет подключения');
                }
            };
            reader.readAsDataURL(file);
        }
        
        function handleAnyFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 10 * 1024 * 1024) {
                alert('Файл слишком большой (макс 10MB)');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const msg = {
                    type: 'file',
                    user: username,
                    name: file.name,
                    size: file.size,
                    data: e.target.result,
                    time: Date.now()
                };
                
                if (dataChannel && dataChannel.readyState === 'open') {
                    dataChannel.send(JSON.stringify(msg));
                    displayMessage(msg);
                } else {
                    alert('Нет подключения');
                }
            };
            
            if (file.type.startsWith('image/')) {
                reader.readAsDataURL(file);
            } else {
                reader.readAsArrayBuffer(file);
            }
        }
        
        // ========== УТИЛИТЫ ==========
        function copyOffer() {
            const code = document.getElementById('offerCode').value;
            if (!code) {
                alert('Сначала создайте код');
                return;
            }
            navigator.clipboard.writeText(code).then(() => {
                alert('📋 Код скопирован!');
            }).catch(() => {
                alert('Не удалось скопировать, скопируйте вручную');
            });
        }
        
        function checkEnter(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }
        
        function resetConnection() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            peerConnection = null;
            dataChannel = null;
            iceCandidates = [];
            
            document.getElementById('connectionPanel').style.display = 'block';
            document.getElementById('chatContainer').classList.remove('active');
            document.getElementById('backBtn').style.display = 'none';
            
            document.getElementById('hostBtn').disabled = false;
            document.getElementById('joinBtn').disabled = false;
            document.getElementById('hostBtn').style.background = '';
            document.getElementById('joinBtn').style.background = '';
            
            document.getElementById('hostStep').style.display = 'none';
            document.getElementById('joinStep').style.display = 'none';
            
            document.getElementById('offerCode').value = '';
            document.getElementById('answerInput').value = '';
            document.getElementById('offerInput').value = '';
            
            document.getElementById('messages').innerHTML = '';
            
            document.getElementById('hostStatus').innerHTML = '⏳ Создание комнаты...';
            document.getElementById('joinStatus').innerHTML = '⏳ Ожидание кода...';
            document.getElementById('chatStatus').innerHTML = '🔵 Ожидание подключения...';
        }
        
        // Обновляем статус при изменении поля ввода
        document.getElementById('offerInput').addEventListener('input', function() {
            document.getElementById('answerBtn').disabled = this.value.trim() === '';
        });
        
        document.getElementById('answerInput').addEventListener('input', function() {
            document.getElementById('connectBtn').disabled = this.value.trim() === '';
        });
    </script>
</body>
</html>
