<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD Coin - Dark Green Crypto</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ТВОИ СТИЛИ ОСТАЮТСЯ ТАКИМИ ЖЕ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a2f0a 0%, #1a5a1a 100%);
            color: #e8f5e8;
            position: fixed;
        }

        .container {
            width: 100vw;
            height: 100vh;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(10, 40, 10, 0.9);
            border-radius: 15px;
            border: 2px solid #2e8b57;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .coin-name {
            font-size: 2em;
            color: #32cd32;
            text-shadow: 0 0 10px rgba(50, 205, 50, 0.5);
            margin-bottom: 8px;
        }

        .price-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #90ee90;
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(144, 238, 144, 0.7);
        }

        .chart-container {
            background: rgba(10, 40, 10, 0.9);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #2e8b57;
            height: 300px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .stat-card {
            background: rgba(10, 40, 10, 0.9);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2e8b57;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 1.3em;
            color: #90ee90;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            color: #c8e6c8;
            margin-top: 5px;
        }

        .buy-section {
            background: rgba(10, 40, 10, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid #32cd32;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .buy-button {
            background: linear-gradient(135deg, #32cd32, #228b22);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(50, 205, 50, 0.4);
            transition: all 0.3s ease;
        }

        .buy-button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(50, 205, 50, 0.6);
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(50, 205, 50, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .admin-panel {
            background: rgba(10, 40, 10, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .admin-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #32cd32;
            border-radius: 8px;
            background: rgba(20, 60, 20, 0.8);
            color: white;
            font-size: 1em;
        }

        .admin-button {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #0a2f0a;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        /* Анимации */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Скрыть scrollbar */
        .container::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="coin-name">BD COIN</h1>
            <div class="price-display" id="currentPrice">0.0100 ₽</div>
            <div>Капитализация: <span id="marketCap">100.00 ₽</span></div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalSupply">10,000</div>
                <div class="stat-label">Всего монет</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="priceChange">+0.00%</div>
                <div class="stat-label">Изменение</div>
            </div>
        </div>

        <div class="buy-section">
            <h3>Купить BD Coin</h3>
            <p>Текущая цена: <span id="buyPrice">0.0100</span> ₽</p>
            <button class="buy-button pulse" onclick="simulateBuy()">
                КУПИТЬ СЕЙЧАС
            </button>
            <p style="margin-top: 10px; font-size: 0.9em; color: #c8e6c8;">
                💎 BD Coin - криптовалюта будущего!
            </p>
        </div>

        <!-- Админ панель -->
        <div class="admin-panel">
            <h3 style="color: #ffd700; text-align: center;">🔧 Админ Панель</h3>
            <input type="password" id="adminPassword" class="admin-input" placeholder="Пароль администратора">
            <input type="number" id="newPrice" class="admin-input" placeholder="Новая цена (рубли)" step="0.0001" min="0.0001">
            <div style="text-align: center;">
                <button class="admin-button" onclick="loginAdmin()">Войти</button>
                <button class="admin-button" onclick="updatePrice()">Обновить цену</button>
                <button class="admin-button" onclick="addRandomData()">Тест данных</button>
            </div>
            <div id="adminMessage" style="text-align: center; margin-top: 10px; color: #90ee90;"></div>
        </div>
    </div>

    <div class="notification" id="notification">
        Покупка успешно выполнена!
    </div>

    <script>
        // ========== СЕРВЕР НА JAVASCRIPT ==========
        class BDCoinServer {
            constructor() {
                this.totalSupply = 10000;
                this.currentPrice = 0.01;
                this.priceHistory = [];
                this.adminPassword = "bdadmin2024";
                this.initializeHistory();
                
                // Создаем простой HTTP сервер для бота
                this.setupBotAPI();
            }

            initializeHistory() {
                const now = Date.now();
                for (let i = 50; i >= 0; i--) {
                    this.priceHistory.push({
                        timestamp: now - (i * 3600000),
                        price: 0.01,
                        date: new Date(now - (i * 3600000)).toLocaleTimeString('ru-RU', { 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        })
                    });
                }
            }

            // API для Telegram бота
            setupBotAPI() {
                // Эндпоинт для получения текущей цены
                window.getCurrentPriceAPI = () => {
                    return {
                        price: this.currentPrice,
                        market_cap: this.currentPrice * this.totalSupply,
                        total_supply: this.totalSupply
                    };
                };

                // Эндпоинт для обновления цены
                window.updatePriceAPI = (newPrice, password) => {
                    if (password !== this.adminPassword) {
                        return { error: "Неверный пароль" };
                    }

                    const oldPrice = this.currentPrice;
                    this.currentPrice = parseFloat(newPrice);
                    
                    this.priceHistory.push({
                        timestamp: Date.now(),
                        price: this.currentPrice,
                        date: new Date().toLocaleTimeString('ru-RU', { 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        })
                    });

                    if (this.priceHistory.length > 100) {
                        this.priceHistory = this.priceHistory.slice(-100);
                    }

                    return { 
                        success: true, 
                        new_price: this.currentPrice,
                        old_price: oldPrice
                    };
                };

                // Эндпоинт для получения истории
                window.getPriceHistoryAPI = (limit = 24) => {
                    return this.priceHistory.slice(-limit);
                };
            }

            getCurrentPrice() {
                return window.getCurrentPriceAPI();
            }

            getPriceHistory(limit = 24) {
                return window.getPriceHistoryAPI(limit);
            }

            updatePrice(newPrice, password) {
                return window.updatePriceAPI(newPrice, password);
            }

            addRandomPriceChange() {
                const change = (Math.random() - 0.5) * 0.2;
                const newPrice = Math.max(0.0001, this.currentPrice * (1 + change));
                this.updatePrice(newPrice, this.adminPassword);
            }
        }

        // Инициализация сервера
        const bdCoinServer = new BDCoinServer();

        // ========== КЛИЕНТСКАЯ ЧАСТЬ ==========
        let priceChart;
        let currentPrice = 0.01;
        let isAdminLoggedIn = false;

        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Цена BD (₽)',
                        data: [],
                        borderColor: '#32cd32',
                        backgroundColor: 'rgba(50, 205, 50, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#90ee90',
                        pointBorderColor: '#32cd32',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e8f5e8',
                                font: {
                                    size: 14
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#c8e6c8'
                            },
                            grid: {
                                color: 'rgba(200, 230, 200, 0.1)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#c8e6c8'
                            },
                            grid: {
                                color: 'rgba(200, 230, 200, 0.1)'
                            }
                        }
                    }
                }
            });
        }

        function updateData() {
            const data = bdCoinServer.getCurrentPrice();
            const history = bdCoinServer.getPriceHistory(24);
            
            currentPrice = data.price;
            
            document.getElementById('currentPrice').textContent = currentPrice.toFixed(4) + ' ₽';
            document.getElementById('buyPrice').textContent = currentPrice.toFixed(4);
            document.getElementById('marketCap').textContent = data.market_cap.toFixed(2) + ' ₽';
            document.getElementById('totalSupply').textContent = data.total_supply.toLocaleString();
            
            if (history.length > 1) {
                const change = ((currentPrice - history[0].price) / history[0].price) * 100;
                const changeElement = document.getElementById('priceChange');
                changeElement.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                changeElement.style.color = change >= 0 ? '#90ee90' : '#ff6b6b';
            }
            
            updateChart(history);
        }

        function updateChart(priceData) {
            const labels = priceData.map(item => item.date);
            const prices = priceData.map(item => item.price);
            
            priceChart.data.labels = labels;
            priceChart.data.datasets[0].data = prices;
            priceChart.update('none');
        }

        function simulateBuy() {
            const notification = document.getElementById('notification');
            notification.style.display = 'block';
            notification.textContent = `Покупка BD Coin по цене ${currentPrice.toFixed(4)} ₽ выполнена!`;
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === bdCoinServer.adminPassword) {
                isAdminLoggedIn = true;
                showAdminMessage('✅ Успешный вход в админ-панель!', '#90ee90');
            } else {
                showAdminMessage('❌ Неверный пароль!', '#ff6b6b');
            }
        }

        function updatePrice() {
            if (!isAdminLoggedIn) {
                showAdminMessage('❌ Сначала войдите в систему!', '#ff6b6b');
                return;
            }

            const newPrice = document.getElementById('newPrice').value;
            if (!newPrice) {
                showAdminMessage('❌ Введите новую цену!', '#ff6b6b');
                return;
            }

            const result = bdCoinServer.updatePrice(newPrice, bdCoinServer.adminPassword);
            if (result.success) {
                showAdminMessage(`✅ Цена обновлена: ${result.old_price.toFixed(4)} → ${result.new_price.toFixed(4)} ₽`, '#90ee90');
                document.getElementById('newPrice').value = '';
                updateData();
            } else {
                showAdminMessage('❌ Ошибка обновления цены', '#ff6b6b');
            }
        }

        function addRandomData() {
            bdCoinServer.addRandomPriceChange();
            showAdminMessage('🎲 Добавлено случайное изменение цены', '#ffd700');
            updateData();
        }

        function showAdminMessage(message, color) {
            const messageElement = document.getElementById('adminMessage');
            messageElement.textContent = message;
            messageElement.style.color = color;
            setTimeout(() => {
                messageElement.textContent = '';
            }, 5000);
        }

        // Запуск обновления
        setInterval(updateData, 3000);

        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            updateData();
            
            // Блокировка масштабирования
            document.addEventListener('touchmove', function(e) {
                if (e.scale !== 1) {
                    e.preventDefault();
                }
            }, { passive: false });

            document.addEventListener('gesturestart', function(e) {
                e.preventDefault();
            });

            document.addEventListener('wheel', function(e) {
                if (e.ctrlKey) {
                    e.preventDefault();
                }
            }, { passive: false });
        });
    </script>
</body>
</html>
