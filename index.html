<!DOCTYPE html>
<html>
<head>
    <title>Anom Web 1.5</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 15px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ff9d;
        }
        
        .header .version {
            color: #666;
            font-size: 14px;            margin-top: 5px;
        }
        
        .security-badge {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 8px;
            margin: 15px 0;
            font-size: 12px;
            text-align: center;
            color: #00cc7a;
        }
        
        .user-info {
            background: #1a1a1a;
            border: 1px dashed #00ff9d;
            padding: 8px 12px;
            margin: 10px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-tag {
            color: #00cc7a;
            font-weight: bold;
        }
        
        .setup-section {
            margin: 20px 0;
        }
        
        input, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 5px 0 15px 0;
            border-radius: 5px;
        }
        
        textarea {
            height: 80px;
            resize: vertical;
        }
                input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
        
        button {
            width: 100%;
            background: transparent;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            margin: 5px 0;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .message {
            margin: 8px 0;
            word-break: break-word;
            padding: 4px 0;            border-bottom: 1px solid #1a1a1a;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .join-message {
            color: #ffaa00;
            text-align: center;
            font-size: 12px;
            margin: 8px 0;
            padding: 4px;
            background: rgba(255, 170, 0, 0.1);
            border-left: 3px solid #ffaa00;
            font-style: italic;
        }
        
        .system-message {
            color: #666;
            text-align: center;
            font-size: 12px;
            margin: 10px 0;
        }
        
        .connection-info {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        
        .peer-list {
            margin: 10px 0;
            padding: 5px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .peer-item {
            color: #00cc7a;
            padding: 3px 0;
            font-size: 12px;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
        
        .room-display {
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
            color: #00ff9d;
            word-break: break-all;
            font-family: monospace;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }
        
        .step {
            padding: 5px 15px;
            border: 1px solid #00ff9d;
            margin: 0 5px;
            border-radius: 3px;
        }
        
        .step.active {
            background: #00ff9d;
            color: #0a0a0a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM WEB</h1>
            <div class="version">version 1.5 // p2p build</div>
        </div>
        
        <div class="security-badge">
            ⚡ P2P EPHEMERAL PROTOCOL ⚡<br>
            direct connection // no servers // no logs<br>            messages self-destruct on page refresh
        </div>
        
        <div class="user-info">
            <span>🔐 your id:</span>
            <span class="user-tag" id="userDisplay">agent_</span>
        </div>
        
        <!-- Setup Section -->
        <div class="setup-section" id="setupSection">
            <div class="step-indicator">
                <div class="step active" id="step1">1. ROOM NAME</div>
                <div class="step" id="step2">2. JOIN ROOM</div>
            </div>
            
            <input type="text" id="roomName" placeholder="[enter room name]" maxlength="30">
            <button onclick="joinRoom()">> JOIN ROOM _</button>
        </div>
        
        <!-- Room Section -->
        <div class="setup-section" id="roomSection" style="display: none;">
            <div class="room-display" id="roomDisplay"></div>
            <div class="connection-info">
                <div style="text-align: center; margin-bottom: 10px;">
                    <strong>[ CONNECTION STATUS ]</strong>
                </div>
                <div id="connectionStatus" style="color: #ffaa00; text-align: center;">
                    waiting for peer...
                </div>
                <div class="peer-list" id="peerList"></div>
            </div>
        </div>
        
        <!-- Chat Area -->
        <div id="chatArea" class="chat-area">
            <div class="messages" id="messages"></div>
            
            <input type="text" id="messageInput" placeholder="[type message]" maxlength="500">
            <button onclick="sendMessage()" id="sendButton" disabled>> SEND _</button>
            
            <div class="status" id="status">[connecting...]</div>
        </div>
        
        <div class="footer">
            [PER-ANOM 1.5] // [P2P] // [NO STORAGE]
        </div>
    </div>

    <!-- Socket.IO and Simple Peer -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    
    <script>
        // Generate random username
        const username = 'agent_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        document.getElementById('userDisplay').innerText = username;
        
        // Global variables
        let socket = null;
        let peer = null;
        let currentRoom = null;
        let isConnected = false;
        
        // Initialize socket connection
        function initSocket() {
            // Using public Socket.IO server
            socket = io('https://socket-io-chat-app-server.onrender.com/', {
                transports: ['websocket']
            });
            
            socket.on('connect', () => {
                console.log('Connected to signaling server');
            });
            
            socket.on('user-joined', (data) => {
                if (data.room === currentRoom && data.username !== username) {
                    addJoinMessage(`${data.username} joined the room`);
                }
            });
            
            socket.on('user-left', (data) => {
                if (data.room === currentRoom) {
                    addJoinMessage(`${data.username} left the room`);
                    document.getElementById('sendButton').disabled = true;
                    document.getElementById('status').innerText = '[peer disconnected]';
                    isConnected = false;
                }
            });
            
            socket.on('signal', (data) => {
                if (data.room === currentRoom && data.from !== username) {
                    handleSignal(data.signal);
                }
            });
        }
        
        // Join a room
        function joinRoom() {
            const roomName = document.getElementById('roomName').value.trim();
            if (!roomName) {                alert('[ERROR] enter room name');
                return;
            }
            
            currentRoom = roomName;
            
            // Initialize socket if not already done
            if (!socket) {
                initSocket();
            }
            
            // Join room via socket
            socket.emit('join-room', { room: roomName, username: username });
            
            // Update UI
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('roomSection').style.display = 'block';
            document.getElementById('chatArea').style.display = 'block';
            document.getElementById('roomDisplay').innerText = `[${roomName}]`;
            
            // Listen for peer connections
            setupPeerConnection();
        }
        
        // Set up peer connection
        function setupPeerConnection() {
            peer = new SimplePeer({
                initiator: true, // Always start as initiator
                trickle: true
            });
            
            peer.on('signal', data => {
                if (socket && currentRoom) {
                    socket.emit('signal', {
                        room: currentRoom,
                        signal: data,
                        from: username
                    });
                }
            });
            
            peer.on('connect', () => {
                addJoinMessage('secure connection established');
                document.getElementById('sendButton').disabled = false;
                document.getElementById('status').innerText = '[connected]';
                isConnected = true;
            });
            
            peer.on('data', data => {
                const message = data.toString();                displayMessage(message, 'friend');
            });
            
            peer.on('close', () => {
                document.getElementById('sendButton').disabled = true;
                document.getElementById('status').innerText = '[disconnected]';
                isConnected = false;
            });
            
            peer.on('error', err => {
                console.error('Peer error:', err);
            });
        }
        
        // Handle incoming signals
        function handleSignal(signal) {
            if (!peer) {
                // If we don't have a peer yet, create one as responder
                peer = new SimplePeer({
                    initiator: false,
                    trickle: true
                });
                
                peer.on('signal', data => {
                    if (socket && currentRoom) {
                        socket.emit('signal', {
                            room: currentRoom,
                            signal: data,
                            from: username
                        });
                    }
                });
                
                peer.on('connect', () => {
                    addJoinMessage('secure connection established');
                    document.getElementById('sendButton').disabled = false;
                    document.getElementById('status').innerText = '[connected]';
                    isConnected = true;
                });
                
                peer.on('data', data => {
                    const message = data.toString();
                    displayMessage(message, 'friend');
                });
                
                peer.on('close', () => {
                    document.getElementById('sendButton').disabled = true;
                    document.getElementById('status').innerText = '[disconnected]';
                    isConnected = false;
                });                
                peer.on('error', err => {
                    console.error('Peer error:', err);
                });
            }
            
            // Signal the peer
            peer.signal(signal);
        }
        
        // Display functions
        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const systemElement = document.createElement('div');
            systemElement.className = 'system-message';
            systemElement.innerHTML = '>>> ' + text + ' <<<';
            messagesDiv.appendChild(systemElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addJoinMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const joinElement = document.createElement('div');
            joinElement.className = 'join-message';
            joinElement.innerHTML = '➤ ' + text;
            messagesDiv.appendChild(joinElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function displayMessage(text, from) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            
            const time = new Date().toLocaleTimeString();
            
            messageElement.innerHTML = `
                <strong>[${from}]</strong> 
                <span style="color:#888;">${time}</span><br>
                ${text}
            `;
            
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Send message
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();            
            if (!message) return;
            if (!isConnected) {
                alert('[ERROR] not connected');
                return;
            }
            
            // Display own message
            displayMessage(message, username);
            
            // Send to peer
            peer.send(message);
            
            messageInput.value = '';
        }
        
        // Handle Enter key
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', function (e) {
            if (socket && currentRoom) {
                socket.emit('leave-room', { room: currentRoom, username: username });
            }
        });
        
        console.log('ANOM WEB 1.5 P2P // READY');
    </script>
</body>
</html>
