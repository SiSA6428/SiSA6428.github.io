<!DOCTYPE html>
<html>
<head>
    <title>ANOM DIRECT</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 10px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
        }
        
        .peer-info {
            background: #1a1a1a;
            border: 1px dashed #00ff9d;
            padding: 15px;
            margin: 10px 0;
            font-size: 12px;
            word-break: break-all;
        }
        
        .peer-id {
            color: #00ff9d;
            font-weight: bold;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input, button, textarea {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border-radius: 5px;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .message {
            margin: 5px 0;
            padding: 8px;
            border-bottom: 1px solid #333;
            word-wrap: break-word;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .system-message {
            color: #ffaa00;
            text-align: center;
            font-style: italic;
            margin: 5px 0;
            font-size: 12px;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;
            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
        
        .file-input-container {
            margin: 5px 0;
            position: relative;
        }
        
        .file-input-label {
            display: block;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            text-align: center;
            cursor: pointer;
            border-radius: 5px;
        }
        
        .file-input-label:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 0.1px;
            height: 0.1px;
        }
        
        .photo-message {
            max-width: 200px;
            max-height: 200px;
            margin: 5px 0;
            border: 1px solid #00ff9d;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .photo-message:hover {
            opacity: 0.8;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #00ff9d;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #00ff9d;
            font-size: 30px;
            cursor: pointer;
        }
        
        .signal-area {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 15px;
            margin: 15px 0;
        }
        
        .signal-title {
            color: #00ff9d;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .small-note {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM DIRECT</h1>
            <div class="version">copy/paste signaling</div>
        </div>
        
        <div class="small-note">
            ⚡ HOST: create offer → send to friend → paste answer<br>
            ⚡ JOIN: paste offer → create answer → send back to host
        </div>
        
        <!-- HOST SECTION -->
        <div class="signal-area">
            <div class="signal-title">🔵 HOST (create connection)</div>
            <button onclick="createOffer()" id="createOfferBtn">1️⃣ CREATE OFFER</button>
            <textarea id="offerSDP" placeholder="Your offer will appear here... copy and send to friend"></textarea>
            <button onclick="copyOffer()" id="copyOfferBtn" disabled>📋 COPY OFFER</button>
            
            <div style="margin: 20px 0; border-top: 1px solid #333;"></div>
            
            <textarea id="answerSDP" placeholder="Paste friend's answer here..."></textarea>
            <button onclick="setAnswer()" id="setAnswerBtn" disabled>3️⃣ SET ANSWER</button>
        </div>
        
        <!-- JOIN SECTION -->
        <div class="signal-area">
            <div class="signal-title">🟢 JOIN (connect to host)</div>
            <textarea id="remoteOfferSDP" placeholder="Paste host's offer here..."></textarea>
            <button onclick="createAnswer()" id="createAnswerBtn">2️⃣ CREATE ANSWER</button>
            <textarea id="localAnswerSDP" placeholder="Your answer will appear here... copy and send to host"></textarea>
            <button onclick="copyAnswer()" id="copyAnswerBtn" disabled>📋 COPY ANSWER</button>
        </div>
        
        <!-- CHAT AREA -->
        <div id="chatArea" style="display: none;">
            <div class="messages" id="messages"></div>
            
            <div style="display: flex; gap: 10px;">
                <input type="text" id="messageInput" placeholder="type message" style="flex: 3;">
                <button onclick="sendMessage()" style="flex: 1;">SEND</button>
            </div>
            
            <div class="file-input-container">
                <label for="photoInput" class="file-input-label">📷 SEND PHOTO</label>
                <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
            </div>
            
            <div id="photoPreview" style="display: none; margin: 10px 0;">
                <img id="previewImage" style="max-width: 100%; max-height: 150px; border: 1px solid #00ff9d;">
                <button onclick="sendPhoto()">> SEND PHOTO _</button>
                <button onclick="cancelPhoto()" style="background: #330000;">✕ CANCEL</button>
            </div>
            
            <div class="status" id="chatStatus">[disconnected]</div>
        </div>
        
        <div class="footer">
            [ANOM DIRECT] // [COPY/PASTE SIGNALING] // [NO SERVER]
        </div>
    </div>

    <!-- Modal for full-size photo -->
    <div id="photoModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage">
    </div>

    <script>
        // Configuration
        const username = 'user_' + Math.floor(Math.random() * 1000);
        let peerConnection = null;
        let dataChannel = null;
        let selectedPhotoData = null;
        
        // STUN servers (free, for NAT traversal)
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };
        
        // HOST: Create offer
        async function createOffer() {
            try {
                peerConnection = new RTCPeerConnection(configuration);
                
                // Create data channel
                dataChannel = peerConnection.createDataChannel('chat');
                setupDataChannel();
                
                // Create offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // Wait for ICE gathering
                await waitForICE(peerConnection);
                
                // Display offer
                const offerSDP = JSON.stringify({
                    type: peerConnection.localDescription.type,
                    sdp: peerConnection.localDescription.sdp
                });
                
                document.getElementById('offerSDP').value = offerSDP;
                document.getElementById('copyOfferBtn').disabled = false;
                document.getElementById('setAnswerBtn').disabled = false;
                
                addSystemMessage('✅ Offer created! Copy and send to friend');
                
            } catch (error) {
                console.error('Error creating offer:', error);
                alert('Error: ' + error.message);
            }
        }
        
        // JOIN: Create answer from offer
        async function createAnswer() {
            try {
                const offerText = document.getElementById('remoteOfferSDP').value.trim();
                if (!offerText) {
                    alert('Paste host offer first');
                    return;
                }
                
                const offer = JSON.parse(offerText);
                
                peerConnection = new RTCPeerConnection(configuration);
                
                // Handle incoming data channel
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel();
                };
                
                // Set remote description
                await peerConnection.setRemoteDescription(offer);
                
                // Create answer
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                // Wait for ICE gathering
                await waitForICE(peerConnection);
                
                // Display answer
                const answerSDP = JSON.stringify({
                    type: peerConnection.localDescription.type,
                    sdp: peerConnection.localDescription.sdp
                });
                
                document.getElementById('localAnswerSDP').value = answerSDP;
                document.getElementById('copyAnswerBtn').disabled = false;
                
                addSystemMessage('✅ Answer created! Copy and send to host');
                
            } catch (error) {
                console.error('Error creating answer:', error);
                alert('Error: ' + error.message);
            }
        }
        
        // HOST: Set answer from join
        async function setAnswer() {
            try {
                const answerText = document.getElementById('answerSDP').value.trim();
                if (!answerText) {
                    alert('Paste friend answer first');
                    return;
                }
                
                const answer = JSON.parse(answerText);
                await peerConnection.setRemoteDescription(answer);
                
                addSystemMessage('✅ Connection established!');
                showChat();
                
            } catch (error) {
                console.error('Error setting answer:', error);
                alert('Error: ' + error.message);
            }
        }
        
        // Setup data channel
        function setupDataChannel() {
            dataChannel.onopen = () => {
                addSystemMessage('✅ Data channel open!');
                showChat();
                
                // Send join message
                sendSystemMessage(username + ' connected');
            };
            
            dataChannel.onclose = () => {
                addSystemMessage('❌ Connection closed');
                hideChat();
            };
            
            dataChannel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    displayMessage(data);
                } catch (e) {
                    console.log('Raw message:', event.data);
                }
            };
        }
        
        // Wait for ICE gathering
        function waitForICE(pc) {
            return new Promise((resolve) => {
                if (pc.iceGatheringState === 'complete') {
                    resolve();
                } else {
                    pc.addEventListener('icegatheringstatechange', () => {
                        if (pc.iceGatheringState === 'complete') {
                            resolve();
                        }
                    });
                }
            });
        }
        
        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !dataChannel || dataChannel.readyState !== 'open') {
                alert('Not connected');
                return;
            }
            
            const msg = {
                type: 'text',
                user: username,
                text: text,
                time: Date.now()
            };
            
            dataChannel.send(JSON.stringify(msg));
            displayMessage(msg);
            input.value = '';
        }
        
        // Send system message
        function sendSystemMessage(text) {
            if (!dataChannel || dataChannel.readyState !== 'open') return;
            
            const msg = {
                type: 'system',
                text: text,
                time: Date.now()
            };
            
            dataChannel.send(JSON.stringify(msg));
        }
        
        // Handle photo selection
        function handlePhotoSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Check file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('Photo too big! Max 5MB');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedPhotoData = e.target.result;
                document.getElementById('previewImage').src = selectedPhotoData;
                document.getElementById('photoPreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        // Send photo
        function sendPhoto() {
            if (!selectedPhotoData || !dataChannel || dataChannel.readyState !== 'open') {
                alert('Not connected');
                return;
            }
            
            const msg = {
                type: 'photo',
                user: username,
                photo: selectedPhotoData,
                time: Date.now()
            };
            
            dataChannel.send(JSON.stringify(msg));
            displayMessage(msg);
            cancelPhoto();
        }
        
        // Cancel photo
        function cancelPhoto() {
            selectedPhotoData = null;
            document.getElementById('photoInput').value = '';
            document.getElementById('photoPreview').style.display = 'none';
        }
        
        // Display message
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            
            if (msg.type === 'system') {
                msgDiv.className = 'system-message';
                msgDiv.innerText = '➤ ' + msg.text;
            } else if (msg.type === 'photo') {
                msgDiv.className = 'message';
                const time = new Date(msg.time).toLocaleTimeString();
                msgDiv.innerHTML = `<strong>[${msg.user}]</strong> ${time}<br>
                    <img src="${msg.photo}" class="photo-message" onclick="openModal('${msg.photo}')">`;
            } else {
                msgDiv.className = 'message';
                const time = new Date(msg.time).toLocaleTimeString();
                msgDiv.innerHTML = `<strong>[${msg.user}]</strong> ${time}<br>${escapeHtml(msg.text)}`;
            }
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Add system message
        function addSystemMessage(text) {
            displayMessage({
                type: 'system',
                text: text,
                time: Date.now()
            });
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Copy functions
        function copyOffer() {
            const text = document.getElementById('offerSDP').value;
            navigator.clipboard.writeText(text).then(() => {
                alert('Offer copied!');
            });
        }
        
        function copyAnswer() {
            const text = document.getElementById('localAnswerSDP').value;
            navigator.clipboard.writeText(text).then(() => {
                alert('Answer copied!');
            });
        }
        
        // UI functions
        function showChat() {
            document.getElementById('chatArea').style.display = 'block';
            document.getElementById('chatStatus').innerText = '[connected]';
        }
        
        function hideChat() {
            document.getElementById('chatArea').style.display = 'none';
            document.getElementById('chatStatus').innerText = '[disconnected]';
        }
        
        // Modal functions
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('photoModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }
        
        // Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
