<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BD Coin - Dark Green Crypto</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a2f0a 0%, #1a5a1a 100%);
            color: #e8f5e8;
            position: fixed;
        }

        .container {
            width: 100vw;
            height: 100vh;
            padding: 15px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(10, 40, 10, 0.9);
            border-radius: 15px;
            border: 2px solid #2e8b57;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .coin-name {
            font-size: 2em;
            color: #32cd32;
            text-shadow: 0 0 10px rgba(50, 205, 50, 0.5);
            margin-bottom: 8px;
        }

        .price-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #90ee90;
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(144, 238, 144, 0.7);
        }

        .chart-container {
            background: rgba(10, 40, 10, 0.9);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #2e8b57;
            height: 300px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }

        .stat-card {
            background: rgba(10, 40, 10, 0.9);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2e8b57;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 1.3em;
            color: #90ee90;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            color: #c8e6c8;
            margin-top: 5px;
        }

        .buy-section {
            background: rgba(10, 40, 10, 0.9);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid #32cd32;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .buy-button {
            background: linear-gradient(135deg, #32cd32, #228b22);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(50, 205, 50, 0.4);
            transition: all 0.3s ease;
        }

        .buy-button:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(50, 205, 50, 0.6);
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(50, 205, 50, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Анимации */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Скрыть scrollbar */
        .container::-webkit-scrollbar {
            display: none;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .coin-name {
                font-size: 1.8em;
            }
            
            .price-display {
                font-size: 2em;
            }
            
            .chart-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="coin-name">BD COIN</h1>
            <div class="price-display" id="currentPrice">0.01 ₽</div>
            <div class="market-cap">Капитализация: <span id="marketCap">100 ₽</span></div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalSupply">10,000</div>
                <div class="stat-label">Всего монет</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="priceChange">+0.00%</div>
                <div class="stat-label">Изменение</div>
            </div>
        </div>

        <div class="buy-section">
            <h3>Купить BD Coin</h3>
            <p>Текущая цена: <span id="buyPrice">0.01</span> ₽</p>
            <button class="buy-button pulse" onclick="simulateBuy()">
                КУПИТЬ СЕЙЧАС
            </button>
            <p style="margin-top: 10px; font-size: 0.9em; color: #c8e6c8;">
                Продажа через Telegram бота
            </p>
        </div>
    </div>

    <div class="notification" id="notification">
        Покупка успешно выполнена!
    </div>

    <script>
        let priceChart;
        let currentPrice = 0.01;

        // Инициализация графика
        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Цена BD (₽)',
                        data: [],
                        borderColor: '#32cd32',
                        backgroundColor: 'rgba(50, 205, 50, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#90ee90',
                        pointBorderColor: '#32cd32',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e8f5e8',
                                font: {
                                    size: 14
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#c8e6c8'
                            },
                            grid: {
                                color: 'rgba(200, 230, 200, 0.1)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#c8e6c8'
                            },
                            grid: {
                                color: 'rgba(200, 230, 200, 0.1)'
                            }
                        }
                    }
                }
            });
        }

        // Обновление данных
        async function updateData() {
            try {
                const response = await fetch('/api/current_price');
                const data = await response.json();
                
                currentPrice = data.price;
                document.getElementById('currentPrice').textContent = currentPrice.toFixed(4) + ' ₽';
                document.getElementById('buyPrice').textContent = currentPrice.toFixed(4);
                document.getElementById('marketCap').textContent = (data.market_cap).toFixed(2) + ' ₽';
                
                // Обновляем график
                const priceResponse = await fetch('/api/price_data');
                const priceData = await priceResponse.json();
                
                updateChart(priceData);
                
            } catch (error) {
                console.error('Error updating data:', error);
            }
        }

        // Обновление графика
        function updateChart(priceData) {
            const labels = priceData.map(item => item.date);
            const prices = priceData.map(item => item.price);
            
            priceChart.data.labels = labels;
            priceChart.data.datasets[0].data = prices;
            priceChart.update();
        }

        // Симуляция покупки
        function simulateBuy() {
            const notification = document.getElementById('notification');
            notification.style.display = 'block';
            notification.textContent = 'Покупка BD Coin выполнена!';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Запуск обновления каждые 5 секунд
        setInterval(updateData, 5000);

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            initChart();
            updateData();
        });

        // Блокировка масштабирования и скролла
        document.addEventListener('touchmove', function(e) {
            if (e.scale !== 1) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        document.addEventListener('wheel', function(e) {
            if (e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
