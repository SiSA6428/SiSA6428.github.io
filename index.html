<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Диагностика звуков</title>
    <style>
        body { 
            background: white; 
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .sound-item {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .exists { 
            background: #d4edda; 
            border-color: #c3e6cb;
            color: #155724;
        }
        .not-exists { 
            background: #f8d7da; 
            border-color: #f5c6cb;
            color: #721c24;
        }
        .button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 20px 0;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🔊 Диагностика звуков в репозитории</h1>
    
    <div>
        <button class="button" id="checkBtn" onclick="checkAllSounds()">🔍 Проверить все звуки</button>
        <button class="button" id="playRandomBtn" onclick="playRandomSound()" disabled>🎲 Сыграть случайный</button>
    </div>
    
    <div id="results"></div>
    
    <audio id="player"></audio>

    <script>
        // Твои звуки от 1 до 6
        const soundFiles = [
            'sound1.mp3',
            'sound2.mp3',
            'sound3.mp3',
            'sound4.mp3',
            'sound5.mp3',
            'sound6.mp3'
        ];
        
        let availableSounds = [];
        const resultsDiv = document.getElementById('results');
        const playRandomBtn = document.getElementById('playRandomBtn');
        
        async function checkAllSounds() {
            resultsDiv.innerHTML = '<h3>Проверка...</h3>';
            availableSounds = [];
            
            for (let i = 0; i < soundFiles.length; i++) {
                const sound = soundFiles[i];
                const div = document.createElement('div');
                div.className = 'sound-item';
                div.innerHTML = `⏳ Проверка ${sound}...`;
                resultsDiv.appendChild(div);
                
                try {
                    // Пробуем загрузить только заголовки файла
                    const response = await fetch(sound + '?v=' + Date.now(), { 
                        method: 'HEAD',
                        cache: 'no-cache'
                    });
                    
                    if (response.ok) {
                        div.className = 'sound-item exists';
                        div.innerHTML = `✅ ${sound} - НАЙДЕН (размер: ${response.headers.get('content-length') || 'неизвестно'} байт)`;
                        availableSounds.push(sound);
                    } else {
                        div.className = 'sound-item not-exists';
                        div.innerHTML = `❌ ${sound} - НЕ НАЙДЕН (статус: ${response.status} ${response.statusText})`;
                    }
                } catch (error) {
                    div.className = 'sound-item not-exists';
                    div.innerHTML = `❌ ${sound} - ОШИБКА: ${error.message}`;
                }
            }
            
            // Итог
            const summary = document.createElement('div');
            summary.style.marginTop = '20px';
            summary.style.padding = '10px';
            summary.style.fontWeight = 'bold';
            
            if (availableSounds.length > 0) {
                summary.innerHTML = `✅ Найдено звуков: ${availableSounds.length} из ${soundFiles.length}<br>`;
                summary.innerHTML += `📋 Список: ${availableSounds.join(', ')}`;
                playRandomBtn.disabled = false;
            } else {
                summary.innerHTML = `❌ НЕ НАЙДЕНО НИ ОДНОГО ЗВУКА!<br>`;
                summary.innerHTML += `Проверь названия файлов в репозитории:<br>`;
                summary.innerHTML += `- Они должны быть в корневой папке<br>`;
                summary.innerHTML += `- Названия ТОЧНО: sound1.mp3, sound2.mp3 и т.д. (маленькими буквами)`;
                playRandomBtn.disabled = true;
            }
            
            resultsDiv.appendChild(summary);
            
            // Проверяем URL репозитория
            const urlInfo = document.createElement('pre');
            urlInfo.innerHTML = `🔗 Текущий URL: ${window.location.href}\n`;
            urlInfo.innerHTML += `📁 Путь к файлам: ${window.location.origin}${window.location.pathname.replace('index.html', '')}`;
            resultsDiv.appendChild(urlInfo);
        }
        
        function playRandomSound() {
            if (availableSounds.length === 0) {
                alert('Сначала проверь звуки!');
                return;
            }
            
            const player = document.getElementById('player');
            const randomIndex = Math.floor(Math.random() * availableSounds.length);
            const randomSound = availableSounds[randomIndex];
            
            console.log('Пытаюсь сыграть:', randomSound);
            
            player.src = randomSound + '?v=' + Date.now();
            player.play()
                .then(() => {
                    alert(`🎵 Играет: ${randomSound}`);
                })
                .catch(error => {
                    alert(`❌ Ошибка: ${error.message}\nПроверь консоль (F12)`);
                    console.error('Ошибка воспроизведения:', error);
                });
        }
        
        // Автоматически запускаем проверку при загрузке
        window.addEventListener('load', checkAllSounds);
    </script>
</body>
</html>
