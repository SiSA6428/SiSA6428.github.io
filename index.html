<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>звук</title>
    <style>
        body { 
            background: white; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }
        .start-btn {
            padding: 20px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="start-btn" onclick="playRandomSound()">👉 Нажми для звука 👈</button>

    <audio id="player"></audio>

    <script>
        function playRandomSound() {
            const player = document.getElementById('player');
            // Пробуем разные варианты звуков
            const sounds = ['sound1.mp3', 'sound2.mp3', 'sound3.mp3', 'sound1.mp3', 'sound.mp3'];
            const randomSound = sounds[Math.floor(Math.random() * sounds.length)];
            
            player.src = randomSound;
            player.play()
                .then(() => console.log('Играет: ' + randomSound))
                .catch(e => {
                    console.log('Ошибка, пробуем другой...');
                    // Если не сработал - пробуем следующий
                    player.src = 'sound1.mp3';
                    player.play();
                });
            
            // Прячем кнопку после нажатия
            document.querySelector('.start-btn').style.display = 'none';
        }
    </script>
</body>
</html>
