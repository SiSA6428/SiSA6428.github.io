<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>случайный звук</title>
    <style>
        body { 
            background: white; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }
        .start-btn {
            padding: 20px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="start-btn" onclick="playRandomSound()">👉 Нажми для звука 👈</button>

    <audio id="player"></audio>

    <script>
        function playRandomSound() {
            const player = document.getElementById('player');
            
            // Только уникальные звуки (убрал повтор)
            const sounds = ['sound1.mp3', 'sound2.mp3', 'sound3.mp3', 'sound4.mp3', 'sound5.mp3'];
            
            // Фильтруем только те звуки, которые реально существуют
            // (можно добавить проверку, но для простоты оставим так)
            
            // Выбираем СЛУЧАЙНЫЙ звук
            const randomIndex = Math.floor(Math.random() * sounds.length);
            const randomSound = sounds[randomIndex];
            
            console.log('Выбран звук: ' + randomSound + ' (индекс: ' + randomIndex + ')');
            
            player.src = randomSound;
            player.play()
                .then(() => {
                    console.log('Играет: ' + randomSound);
                    // Прячем кнопку
                    document.querySelector('.start-btn').style.display = 'none';
                })
                .catch(e => {
                    console.log('Ошибка с ' + randomSound + ', пробуем другой...');
                    
                    // Пробуем другой случайный звук (исключая тот что не сработал)
                    const otherSounds = sounds.filter(s => s !== randomSound);
                    if (otherSounds.length > 0) {
                        const nextRandom = otherSounds[Math.floor(Math.random() * otherSounds.length)];
                        player.src = nextRandom;
                        player.play()
                            .then(() => {
                                console.log('Играет: ' + nextRandom);
                                document.querySelector('.start-btn').style.display = 'none';
                            })
                            .catch(err => {
                                console.log('Ничего не работает');
                                alert('Не удалось воспроизвести звук. Проверь есть ли файлы в репозитории');
                            });
                    }
                });
        }
    </script>
</body>
</html>
