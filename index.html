<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>звук</title>
    <style>
        body { 
            background: white; 
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }
        .start-btn {
            padding: 20px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="start-btn" onclick="playRandomSound()">👉 Нажми для звука 👈</button>

    <audio id="player"></audio>

    <script>
        function playRandomSound() {
            const player = document.getElementById('player');
            // ИСПРАВЛЕНО: добавил запятую между 'sound5.mp3' и 'sound6.mp3'
            const sounds = ['sound1.mp3', 'sound2.mp3', 'sound3.mp3', 'sound4.mp3', 'sound5.mp3', 'sound6.mp3'];
            const randomSound = sounds[Math.floor(Math.random() * sounds.length)];
            
            console.log('Пытаюсь включить:', randomSound); // Полезно для отладки
            
            player.src = randomSound;
            player.play()
                .then(() => {
                    console.log('Играет: ' + randomSound);
                    document.querySelector('.start-btn').style.display = 'none';
                })
                .catch(e => {
                    console.log('Ошибка с ' + randomSound + ', пробуем sound1.mp3');
                    // Если не сработал - пробуем первый
                    player.src = 'sound1.mp3';
                    player.play()
                        .then(() => {
                            console.log('Играет: sound1.mp3');
                            document.querySelector('.start-btn').style.display = 'none';
                        })
                        .catch(err => {
                            console.log('Ничего не работает. Ошибка:', err);
                            alert('Звуки не найдены! Проверь есть ли файлы sound1.mp3 - sound6.mp3 в репозитории.');
                        });
                });
        }
    </script>
</body>
</html>
