<!DOCTYPE html>
<html>
<head>
    <title>Anom Web 2.0</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 15px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
        }
        
        .security-badge {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 8px;
            margin: 15px 0;
            font-size: 12px;
            text-align: center;
        }
        
        .user-info {
            background: #1a1a1a;
            border: 1px dashed #00ff9d;
            padding: 8px 12px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .connection-panel {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        
        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 5px 0 15px 0;
            border-radius: 5px;
        }
        
        textarea {
            height: 100px;
            resize: vertical;
        }
        
        button {
            width: 100%;
            background: transparent;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px 0;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin: 15px 0;
            font-size: 14px;
        }
        
        .message {
            margin: 8px 0;
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .join-message {
            color: #ffaa00;
            text-align: center;
            font-size: 12px;
            margin: 8px 0;
            font-style: italic;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;
            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM WEB 2.0</h1>
            <div class="version">direct p2p // github signaling</div>
        </div>
        
        <div class="security-badge">
            ⚡ TRUE P2P CONNECTION ⚡<br>
            direct browser-to-browser // no middle servers<br>
            exchange keys once // chat forever
        </div>
        
        <div class="user-info">
            <span>🔐 your id:</span>
            <span class="user-tag" id="userDisplay"></span>
        </div>
        
        <!-- Connection Panel -->
        <div class="connection-panel" id="connectionPanel">
            <div style="text-align: center; margin-bottom: 15px;">
                <strong>[ CONNECTION SETUP ]</strong>
            </div>
            
            <button onclick="createOffer()">> 1. CREATE OFFER _</button>
            
            <div style="margin: 15px 0; text-align: center; color: #666;">- or -</div>
            
            <textarea id="offerInput" placeholder="[paste friend's offer here]"></textarea>
            <button onclick="createAnswer()">> 2. CREATE ANSWER _</button>
            
            <textarea id="answerInput" placeholder="[paste friend's answer here]"></textarea>
            <button onclick="completeConnection()">> 3. COMPLETE CONNECTION _</button>
        </div>
        
        <!-- Chat Area -->
        <div id="chatArea" class="chat-area">
            <div class="messages" id="messages"></div>
            <input type="text" id="messageInput" placeholder="[type message]">
            <button onclick="sendMessage()">> SEND _</button>
            <div class="status" id="status">[disconnected]</div>
        </div>
        
        <div class="footer">
            [ANOM 2.0] // [DIRECT P2P] // [NO CLOUD]
        </div>
    </div>

    <script>
        // Generate user ID
        const username = 'user_' + Math.random().toString(36).substr(2, 6);
        document.getElementById('userDisplay').innerText = username;
        
        // WebRTC setup
        let peerConnection = null;
        let dataChannel = null;
        let isConnected = false;
        
        // STUN servers (free, just for finding public IP)
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        };
        
        // Create Offer (User A)
        function createOffer() {
            peerConnection = new RTCPeerConnection(configuration);
            
            // Create data channel
            dataChannel = peerConnection.createDataChannel('chat');
            setupDataChannel();
            
            // Create offer
            peerConnection.createOffer()
                .then(offer => peerConnection.setLocalDescription(offer))
                .then(() => {
                    // Wait for ICE candidates to gather
                    setTimeout(() => {
                        const offerText = JSON.stringify({
                            type: 'offer',
                            sdp: peerConnection.localDescription.sdp,
                            user: username
                        });
                        
                        // Show offer to copy
                        document.getElementById('offerInput').value = offerText;
                        alert('COPY THIS OFFER and send to your friend:\n\n' + offerText);
                    }, 1000);
                });
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('ICE candidate generated');
                }
            };
        }
        
        // Create Answer (User B)
        function createAnswer() {
            const offerText = document.getElementById('offerInput').value.trim();
            if (!offerText) {
                alert('Paste friend\'s offer first');
                return;
            }
            
            try {
                const offer = JSON.parse(offerText);
                
                peerConnection = new RTCPeerConnection(configuration);
                
                // Handle incoming data channel
                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    setupDataChannel();
                };
                
                // Set remote description (offer)
                peerConnection.setRemoteDescription(new RTCSessionDescription({
                    type: 'offer',
                    sdp: offer.sdp
                }))
                .then(() => peerConnection.createAnswer())
                .then(answer => peerConnection.setLocalDescription(answer))
                .then(() => {
                    setTimeout(() => {
                        const answerText = JSON.stringify({
                            type: 'answer',
                            sdp: peerConnection.localDescription.sdp,
                            user: username
                        });
                        
                        document.getElementById('answerInput').value = answerText;
                        alert('COPY THIS ANSWER and send to your friend:\n\n' + answerText);
                    }, 1000);
                });
                
            } catch (e) {
                alert('Invalid offer format');
            }
        }
        
        // Complete Connection (User A receives answer)
        function completeConnection() {
            const answerText = document.getElementById('answerInput').value.trim();
            if (!answerText || !peerConnection) {
                alert('Paste friend\'s answer first');
                return;
            }
            
            try {
                const answer = JSON.parse(answerText);
                
                peerConnection.setRemoteDescription(new RTCSessionDescription({
                    type: 'answer',
                    sdp: answer.sdp
                }))
                .then(() => {
                    console.log('Connection established!');
                });
                
            } catch (e) {
                alert('Invalid answer format');
            }
        }
        
        // Setup data channel
        function setupDataChannel() {
            dataChannel.onopen = () => {
                isConnected = true;
                document.getElementById('connectionPanel').style.display = 'none';
                document.getElementById('chatArea').style.display = 'block';
                document.getElementById('status').innerText = '[connected]';
                addJoinMessage(username + ' connected');
                
                // Send join message
                dataChannel.send(JSON.stringify({
                    type: 'join',
                    user: username
                }));
            };
            
            dataChannel.onclose = () => {
                isConnected = false;
                document.getElementById('status').innerText = '[disconnected]';
            };
            
            dataChannel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'join') {
                        addJoinMessage(data.user + ' joined');
                    } else if (data.type === 'message') {
                        displayMessage(data.text, data.user);
                    }
                } catch (e) {
                    // Plain text message
                    displayMessage(event.data, 'friend');
                }
            };
        }
        
        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !isConnected) {
                alert('Not connected');
                return;
            }
            
            // Display own message
            displayMessage(text, username);
            
            // Send to peer
            dataChannel.send(JSON.stringify({
                type: 'message',
                text: text,
                user: username
            }));
            
            input.value = '';
        }
        
        // Display message
        function displayMessage(text, from) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            const time = new Date().toLocaleTimeString();
            msgDiv.innerHTML = `<strong>[${from}]</strong> ${time}<br>${text}`;
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addJoinMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const joinDiv = document.createElement('div');
            joinDiv.className = 'join-message';
            joinDiv.innerText = '➤ ' + text;
            messagesDiv.appendChild(joinDiv);
        }
        
        // Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
