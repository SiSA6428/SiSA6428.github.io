<!DOCTYPE html>
<html>
<head>
    <title>ANOM P2P</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 10px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
        }
        
        .peer-info {
            background: #1a1a1a;
            border: 1px dashed #00ff9d;
            padding: 15px;
            margin: 10px 0;
            font-size: 12px;
            word-break: break-all;
        }
        
        .peer-id {
            color: #00ff9d;
            font-weight: bold;
            margin: 10px 0;
            padding: 10px;
            background: #000;
            border-radius: 5px;
        }
        
        input, button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border-radius: 5px;
        }
        
        button {
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .message {
            margin: 5px 0;
            padding: 8px;
            border-bottom: 1px solid #333;
            word-wrap: break-word;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .system-message {
            color: #ffaa00;
            text-align: center;
            font-style: italic;
            margin: 5px 0;
            font-size: 12px;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;
            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
        
        .file-input-container {
            margin: 5px 0;
            position: relative;
        }
        
        .file-input-label {
            display: block;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            text-align: center;
            cursor: pointer;
            border-radius: 5px;
        }
        
        .file-input-label:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 0.1px;
            height: 0.1px;
        }
        
        .photo-message {
            max-width: 200px;
            max-height: 200px;
            margin: 5px 0;
            border: 1px solid #00ff9d;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .photo-message:hover {
            opacity: 0.8;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #00ff9d;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #00ff9d;
            font-size: 30px;
            cursor: pointer;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 1px solid #00ff9d;
            cursor: pointer;
        }
        
        .tab.active {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM P2P</h1>
            <div class="version">direct connection</div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('host')" id="tabHost">🔵 HOST</div>
            <div class="tab" onclick="switchTab('join')" id="tabJoin">🟢 JOIN</div>
        </div>
        
        <!-- HOST TAB -->
        <div id="hostTab" class="tab-content active">
            <div class="peer-info">
                <div>🔵 YOUR PEER ID (SEND TO FRIEND):</div>
                <div class="peer-id" id="hostId">GENERATING...</div>
                <button onclick="copyHostId()">📋 COPY ID</button>
            </div>
            <div id="hostStatus" class="system-message">Waiting for connection...</div>
        </div>
        
        <!-- JOIN TAB -->
        <div id="joinTab" class="tab-content">
            <div class="peer-info">
                <div>🟢 ENTER FRIEND'S PEER ID:</div>
                <input type="text" id="peerIdInput" placeholder="paste peer id here">
                <button onclick="connectToPeer()">🔌 CONNECT</button>
                <div id="joinStatus" class="system-message"></div>
            </div>
        </div>
        
        <!-- CHAT AREA (shows when connected) -->
        <div id="chatArea" style="display: none;">
            <div class="messages" id="messages"></div>
            
            <div class="tabs" style="margin: 10px 0;">
                <div class="tab active" onclick="switchChatTab('text')" id="tabText">💬 TEXT</div>
                <div class="tab" onclick="switchChatTab('photo')" id="tabPhoto">📷 PHOTO</div>
            </div>
            
            <!-- TEXT TAB -->
            <div id="textChatTab" class="tab-content active">
                <input type="text" id="messageInput" placeholder="type message">
                <button onclick="sendMessage()">> SEND _</button>
            </div>
            
            <!-- PHOTO TAB -->
            <div id="photoChatTab" class="tab-content">
                <div class="file-input-container">
                    <label for="photoInput" class="file-input-label">📷 SELECT PHOTO</label>
                    <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
                </div>
                <div id="photoPreview" style="display: none; margin: 10px 0;">
                    <img id="previewImage" style="max-width: 100%; max-height: 150px; border: 1px solid #00ff9d;">
                    <button onclick="sendPhoto()">> SEND PHOTO _</button>
                    <button onclick="cancelPhoto()" style="background: #330000;">✕ CANCEL</button>
                </div>
            </div>
            
            <div class="status" id="chatStatus">[connected]</div>
        </div>
        
        <div class="footer">
            [ANOM P2P] // [DIRECT CONNECTION] // [NO STORAGE]
        </div>
    </div>

    <!-- Modal for full-size photo -->
    <div id="photoModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage">
    </div>

    <!-- Include PeerJS -->
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script>
        // Generate random username
        const username = 'user_' + Math.floor(Math.random() * 1000);
        let peer = null;
        let conn = null;
        let selectedPhotoData = null;
        
        // Initialize Peer
        function initPeer() {
            peer = new Peer({
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:global.stun.twilio.com:3478' }
                    ]
                }
            });
            
            peer.on('open', (id) => {
                document.getElementById('hostId').innerText = id;
                document.getElementById('hostStatus').innerText = '✅ Your peer ID ready. Share with friend!';
            });
            
            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
                document.getElementById('hostStatus').innerText = '✅ Friend connected!';
                showChat();
            });
            
            peer.on('error', (err) => {
                console.log('Peer error:', err);
                document.getElementById('hostStatus').innerText = '❌ Error: ' + err.type;
            });
        }
        
        function connectToPeer() {
            const peerId = document.getElementById('peerIdInput').value.trim();
            if (!peerId) {
                alert('Enter peer ID');
                return;
            }
            
            document.getElementById('joinStatus').innerText = '🔄 Connecting...';
            
            conn = peer.connect(peerId);
            setupConnection();
        }
        
        function setupConnection() {
            conn.on('open', () => {
                document.getElementById('joinStatus').innerText = '✅ Connected!';
                showChat();
                
                // Send username
                conn.send({
                    type: 'system',
                    text: username + ' connected'
                });
            });
            
            conn.on('data', (data) => {
                displayMessage(data);
            });
            
            conn.on('close', () => {
                addSystemMessage('Connection closed');
                hideChat();
            });
            
            conn.on('error', (err) => {
                addSystemMessage('Connection error');
                console.log(err);
            });
        }
        
        function showChat() {
            document.getElementById('chatArea').style.display = 'block';
            document.getElementById('chatStatus').innerText = '[connected to: ' + conn.peer + ']';
            addSystemMessage('✅ Connected! You can now chat');
        }
        
        function hideChat() {
            document.getElementById('chatArea').style.display = 'none';
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !conn) return;
            
            const msg = {
                type: 'text',
                user: username,
                text: text,
                time: Date.now()
            };
            
            conn.send(msg);
            displayMessage(msg);
            input.value = '';
        }
        
        function handlePhotoSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Check file size (max 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('Photo too big! Max 5MB');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedPhotoData = e.target.result;
                document.getElementById('previewImage').src = selectedPhotoData;
                document.getElementById('photoPreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        function sendPhoto() {
            if (!selectedPhotoData || !conn) return;
            
            const msg = {
                type: 'photo',
                user: username,
                photo: selectedPhotoData,
                time: Date.now()
            };
            
            conn.send(msg);
            displayMessage(msg);
            cancelPhoto();
            switchChatTab('text');
        }
        
        function cancelPhoto() {
            selectedPhotoData = null;
            document.getElementById('photoInput').value = '';
            document.getElementById('photoPreview').style.display = 'none';
        }
        
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            
            if (msg.type === 'system') {
                msgDiv.className = 'system-message';
                msgDiv.innerText = '➤ ' + (msg.text || msg.user + ' connected');
            } else if (msg.type === 'photo') {
                msgDiv.className = 'message';
                const time = new Date(msg.time).toLocaleTimeString();
                msgDiv.innerHTML = `<strong>[${msg.user}]</strong> ${time}<br>
                    <img src="${msg.photo}" class="photo-message" onclick="openModal('${msg.photo}')">`;
            } else {
                msgDiv.className = 'message';
                const time = new Date(msg.time).toLocaleTimeString();
                msgDiv.innerHTML = `<strong>[${msg.user}]</strong> ${time}<br>${escapeHtml(msg.text)}`;
            }
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addSystemMessage(text) {
            displayMessage({
                type: 'system',
                text: text,
                time: Date.now()
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // UI functions
        function switchTab(tab) {
            document.getElementById('tabHost').className = 'tab';
            document.getElementById('tabJoin').className = 'tab';
            document.getElementById('hostTab').className = 'tab-content';
            document.getElementById('joinTab').className = 'tab-content';
            
            if (tab === 'host') {
                document.getElementById('tabHost').className = 'tab active';
                document.getElementById('hostTab').className = 'tab-content active';
            } else {
                document.getElementById('tabJoin').className = 'tab active';
                document.getElementById('joinTab').className = 'tab-content active';
            }
        }
        
        function switchChatTab(tab) {
            document.getElementById('tabText').className = 'tab';
            document.getElementById('tabPhoto').className = 'tab';
            document.getElementById('textChatTab').className = 'tab-content';
            document.getElementById('photoChatTab').className = 'tab-content';
            
            if (tab === 'text') {
                document.getElementById('tabText').className = 'tab active';
                document.getElementById('textChatTab').className = 'tab-content active';
            } else {
                document.getElementById('tabPhoto').className = 'tab active';
                document.getElementById('photoChatTab').className = 'tab-content active';
            }
        }
        
        function copyHostId() {
            const id = document.getElementById('hostId').innerText;
            navigator.clipboard.writeText(id).then(() => {
                alert('Peer ID copied!');
            });
        }
        
        // Modal functions
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('photoModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }
        
        // Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Initialize
        initPeer();
    </script>
</body>
</html>
