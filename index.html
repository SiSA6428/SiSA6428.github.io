<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Sound Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        /* Просто маленькая метка в углу, чтобы знать что работает */
        .debug-info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #ccc;
            background: rgba(0,0,0,0.02);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Аудио элемент для воспроизведения -->
    <audio id="audioPlayer" preload="auto"></audio>
    
    <!-- Маленькая метка (можно удалить если не нужна) -->
    <div class="debug-info" id="debug">🎵 Ищу звуки...</div>

    <script>
        // Функция для получения списка звуков
        async function getAvailableSounds() {
            const soundNames = [];
            const maxSounds = 10; // Максимальное количество проверяемых звуков
            
            // Проверяем sound1.mp3, sound2.mp3 и т.д.
            for (let i = 1; i <= maxSounds; i++) {
                const soundFile = `sound${i}.mp3`;
                try {
                    const response = await fetch(soundFile, { method: 'HEAD' });
                    if (response.ok) {
                        soundNames.push(soundFile);
                        console.log(`Найден звук: ${soundFile}`);
                    }
                } catch (error) {
                    // Игнорируем ошибки сети
                    console.log(`Ошибка при проверке ${soundFile}:`, error);
                }
            }
            
            return soundNames;
        }

        // Функция для воспроизведения случайного звука
        async function playRandomSound() {
            const debug = document.getElementById('debug');
            const audio = document.getElementById('audioPlayer');
            
            // Получаем список доступных звуков
            const availableSounds = await getAvailableSounds();
            
            if (availableSounds.length === 0) {
                debug.textContent = '❌ Звуки не найдены';
                console.log('Звуки не найдены в репозитории');
                return;
            }
            
            // Выбираем случайный звук
            const randomIndex = Math.floor(Math.random() * availableSounds.length);
            const selectedSound = availableSounds[randomIndex];
            
            debug.textContent = `🎵 Играет: ${selectedSound}`;
            console.log(`Выбран звук: ${selectedSound}`);
            
            // Устанавливаем источник и играем
            audio.src = selectedSound;
            
            // Пытаемся воспроизвести
            try {
                // Важно: большинство браузеров блокируют автоматическое воспроизведение
                // Поэтому сначала пробуем обычный способ
                const playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('Автовоспроизведение сработало');
                    }).catch(error => {
                        console.log('Автовоспроизведение заблокировано браузером:', error);
                        debug.textContent = '⚠ Нажмите в любом месте для звука';
                        
                        // Добавляем обработчик на клик для воспроизведения
                        document.body.addEventListener('click', function playOnClick() {
                            audio.play().catch(e => console.log('Ошибка:', e));
                            document.body.removeEventListener('click', playOnClick);
                            debug.textContent = `🎵 Играет: ${selectedSound}`;
                        }, { once: true });
                    });
                }
            } catch (error) {
                console.log('Ошибка воспроизведения:', error);
                debug.textContent = '❌ Ошибка воспроизведения';
            }
        }

        // Запускаем при загрузке страницы
        window.addEventListener('load', () => {
            console.log('Страница загружена, ищем звуки...');
            playRandomSound();
        });

        // Также пробуем после полной загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM загружен');
        });
    </script>
</body>
</html>
