<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонимный Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin-bottom: 10px;
        }

        .status {
            padding: 10px;
            text-align: center;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .connected {
            color: #28a745;
        }

        .disconnected {
            color: #dc3545;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            height: 70vh;
        }

        .welcome-screen, .chat-screen {
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .welcome-screen {
            text-align: center;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
        }

        .chat-header {
            background: #34495e;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-code {
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message-header {
            display: flex;
            justify-content: between;
            margin-bottom: 5px;
            font-size: 12px;
            color: #666;
        }

        .message-username {
            font-weight: bold;
            color: #2c3e50;
        }

        .message-time {
            margin-left: auto;
        }

        .message-text {
            word-wrap: break-word;
        }

        .my-message {
            background: #e3f2fd;
            margin-left: 20px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            gap: 10px;
            background: white;
        }

        .hidden {
            display: none !important;
        }

        .code-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 24px;
            text-align: center;
            letter-spacing: 3px;
        }

        .copy-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 Анонимный Мессенджер</h1>
            <p>Общайтесь безопасно с одноразовыми кодами</p>
        </div>

        <div class="status">
            <span id="status">Подключение...</span>
        </div>

        <div class="main-content">
            <!-- Экран приветствия -->
            <div id="welcomeScreen" class="welcome-screen">
                <h2>Добро пожаловать!</h2>
                <p>Создайте новый чат или присоединитесь к существующему</p>
                
                <div>
                    <button id="createChatBtn" class="btn btn-primary">
                        🆕 Создать новый чат
                    </button>
                </div>

                <div class="input-group">
                    <input type="text" id="joinCodeInput" placeholder="Введите код чата" maxlength="6">
                    <button id="joinChatBtn" class="btn btn-success">
                        ➕ Присоединиться
                    </button>
                </div>

                <div id="createdChat" class="hidden">
                    <p>Ваш код чата:</p>
                    <div class="code-display">
                        <span id="chatCode"></span>
                        <button class="copy-btn" onclick="copyCode()">📋 Копировать</button>
                    </div>
                    <p>Поделитесь этим кодом с друзьями</p>
                    <button id="enterChatBtn" class="btn btn-success">
                        🚀 Войти в чат
                    </button>
                </div>
            </div>

            <!-- Экран чата -->
            <div id="chatScreen" class="chat-screen hidden">
                <div class="chat-header">
                    <span>Чат: <span id="currentChatCode" class="chat-code"></span></span>
                    <span id="onlineCount">Участников: 1</span>
                </div>

                <div id="messages" class="messages"></div>

                <div class="input-area">
                    <input type="text" id="usernameInput" placeholder="Ваше имя (необязательно)" style="flex: 0.3;">
                    <input type="text" id="messageInput" placeholder="Введите сообщение...">
                    <button id="sendMessageBtn" class="btn btn-primary">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        class AnonymousChat {
            constructor() {
                this.socket = io();
                this.currentChatCode = null;
                this.setupEventListeners();
                this.setupSocketEvents();
            }

            setupEventListeners() {
                // Создание чата
                document.getElementById('createChatBtn').addEventListener('click', () => {
                    this.socket.emit('create_chat');
                });

                // Присоединение к чату
                document.getElementById('joinChatBtn').addEventListener('click', () => {
                    this.joinChat();
                });

                document.getElementById('joinCodeInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.joinChat();
                });

                // Вход в созданный чат
                document.getElementById('enterChatBtn').addEventListener('click', () => {
                    this.showChatScreen();
                });

                // Отправка сообщения
                document.getElementById('sendMessageBtn').addEventListener('click', () => {
                    this.sendMessage();
                });

                document.getElementById('messageInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendMessage();
                });
            }

            setupSocketEvents() {
                this.socket.on('connect', () => {
                    this.updateStatus('connected', '✅ Подключено');
                });

                this.socket.on('disconnect', () => {
                    this.updateStatus('disconnected', '❌ Отключено');
                });

                this.socket.on('chat_created', (code) => {
                    this.currentChatCode = code;
                    document.getElementById('chatCode').textContent = code;
                    document.getElementById('createdChat').classList.remove('hidden');
                });

                this.socket.on('join_success', (data) => {
                    this.currentChatCode = data.code;
                    this.showChatScreen();
                    // Загружаем предыдущие сообщения
                    data.messages.forEach(msg => this.displayMessage(msg));
                });

                this.socket.on('new_message', (message) => {
                    this.displayMessage(message);
                });

                this.socket.on('user_joined', (text) => {
                    this.displaySystemMessage(text);
                });

                this.socket.on('error', (error) => {
                    alert('Ошибка: ' + error);
                });
            }

            joinChat() {
                const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
                if (code.length === 6) {
                    this.socket.emit('join_chat', code);
                } else {
                    alert('Код должен содержать 6 символов');
                }
            }

            showChatScreen() {
                document.getElementById('welcomeScreen').classList.add('hidden');
                document.getElementById('chatScreen').classList.remove('hidden');
                document.getElementById('currentChatCode').textContent = this.currentChatCode;
                document.getElementById('messageInput').focus();
            }

            sendMessage() {
                const messageInput = document.getElementById('messageInput');
                const usernameInput = document.getElementById('usernameInput');
                const message = messageInput.value.trim();
                const username = usernameInput.value.trim() || 'Аноним';

                if (message && this.currentChatCode) {
                    this.socket.emit('send_message', {
                        code: this.currentChatCode,
                        message: message,
                        username: username
                    });
                    messageInput.value = '';
                }
            }

            displayMessage(message) {
                const messagesDiv = document.getElementById('messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                
                // Помечаем свои сообщения
                if (message.socketId === this.socket.id) {
                    messageDiv.classList.add('my-message');
                }

                messageDiv.innerHTML = `
                    <div class="message-header">
                        <span class="message-username">${this.escapeHtml(message.username)}</span>
                        <span class="message-time">${message.timestamp}</span>
                    </div>
                    <div class="message-text">${this.escapeHtml(message.text)}</div>
                `;

                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            displaySystemMessage(text) {
                const messagesDiv = document.getElementById('messages');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message';
                messageDiv.style.textAlign = 'center';
                messageDiv.style.fontStyle = 'italic';
                messageDiv.style.color = '#666';
                messageDiv.textContent = text;
                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            updateStatus(type, text) {
                const statusEl = document.getElementById('status');
                statusEl.textContent = text;
                statusEl.className = type;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Вспомогательные функции
        function copyCode() {
            const code = document.getElementById('chatCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Код скопирован в буфер обмена!');
            });
        }

        // Инициализация приложения
        document.addEventListener('DOMContentLoaded', () => {
            new AnonymousChat();
        });
    </script>
</body>
</html>
