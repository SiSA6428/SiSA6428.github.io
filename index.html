<!DOCTYPE html>
<html>
<head>
    <title>ANOM SIMPLE</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 10px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
        }
        
        .user-info {
            background: #1a1a1a;
            border: 1px dashed #00ff9d;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        
        input, button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border-radius: 5px;
        }
        
        button {
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .message {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #333;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .join-message {
            color: #ffaa00;
            text-align: center;
            font-style: italic;
            margin: 5px 0;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;
            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
        
        .simple-note {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 15px;
            margin: 15px 0;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM SIMPLE</h1>
            <div class="version">just works // no setup</div>
        </div>
        
        <div class="user-info">
            <span>👤 you:</span>
            <span class="user-tag" id="userDisplay"></span>
        </div>
        
        <div class="simple-note" id="note">
            ⚡ 1. Enter room name ⚡<br>
            ⚡ 2. Start chatting ⚡<br>
            ⚡ 3. Messages disappear on refresh ⚡
        </div>
        
        <!-- Room input -->
        <input type="text" id="roomInput" placeholder="room name (any word)" maxlength="30">
        <button onclick="joinRoom()">> JOIN ROOM _</button>
        
        <!-- Chat area -->
        <div id="chatArea" class="chat-area">
            <div class="messages" id="messages"></div>
            <input type="text" id="messageInput" placeholder="type message">
            <button onclick="sendMessage()">> SEND _</button>
            <div class="status" id="status">[connected to room]</div>
        </div>
        
        <div class="footer">
            [ANOM SIMPLE] // [REFRESH TO ERASE]
        </div>
    </div>

    <!-- Use localStorage for temporary storage -->
    <script>
        // Generate random username
        const username = 'user_' + Math.floor(Math.random() * 1000);
        document.getElementById('userDisplay').innerText = username;
        
        let currentRoom = null;
        let messages = [];
        
        function joinRoom() {
            const room = document.getElementById('roomInput').value.trim();
            if (!room) {
                alert('enter room name');
                return;
            }
            
            currentRoom = room;
            
            // Hide note, show chat
            document.getElementById('note').style.display = 'none';
            document.getElementById('chatArea').style.display = 'block';
            
            // Clear messages
            document.getElementById('messages').innerHTML = '';
            messages = [];
            
            // Add system message
            addMessage('system', 'joined room: ' + room);
            addMessage('join', username + ' joined');
            
            // Start checking for messages
            startPolling();
        }
        
        function startPolling() {
            // Check every 2 seconds for new messages
            setInterval(() => {
                if (!currentRoom) return;
                
                // Get messages from localStorage
                const stored = localStorage.getItem('room_' + currentRoom);
                if (stored) {
                    try {
                        const roomMessages = JSON.parse(stored);
                        
                        // Show new messages
                        roomMessages.forEach(msg => {
                            if (!messages.find(m => m.id === msg.id)) {
                                messages.push(msg);
                                displayMessage(msg);
                            }
                        });
                    } catch (e) {}
                }
            }, 2000);
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentRoom) return;
            
            // Create message
            const msg = {
                id: Date.now() + '_' + Math.random(),
                user: username,
                text: text,
                time: Date.now(),
                type: 'message'
            };
            
            // Save to localStorage
            saveMessage(msg);
            
            // Display
            messages.push(msg);
            displayMessage(msg);
            
            input.value = '';
        }
        
        function saveMessage(msg) {
            // Get existing messages for this room
            const key = 'room_' + currentRoom;
            const stored = localStorage.getItem(key);
            let roomMessages = [];
            
            if (stored) {
                try {
                    roomMessages = JSON.parse(stored);
                } catch (e) {}
            }
            
            // Add new message
            roomMessages.push(msg);
            
            // Keep only last 50 messages
            if (roomMessages.length > 50) {
                roomMessages = roomMessages.slice(-50);
            }
            
            // Save back
            localStorage.setItem(key, JSON.stringify(roomMessages));
        }
        
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            
            if (msg.type === 'join') {
                msgDiv.className = 'join-message';
                msgDiv.innerText = '➤ ' + (msg.text || msg.user + ' joined');
            } else if (msg.type === 'system') {
                msgDiv.className = 'join-message';
                msgDiv.style.color = '#666';
                msgDiv.innerText = '>>> ' + msg.text + ' <<<';
            } else {
                msgDiv.className = 'message';
                const time = new Date(msg.time).toLocaleTimeString();
                msgDiv.innerHTML = `<strong>[${msg.user}]</strong> ${time}<br>${msg.text}`;
            }
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addMessage(type, text) {
            const msg = {
                id: Date.now() + '_' + Math.random(),
                type: type,
                text: text,
                user: type === 'message' ? username : 'system',
                time: Date.now()
            };
            
            messages.push(msg);
            displayMessage(msg);
            
            if (type === 'join') {
                saveMessage(msg);
            }
        }
        
        // Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Clean old messages on refresh
        window.addEventListener('beforeunload', () => {
            // Clear this user's messages from localStorage
            if (currentRoom) {
                localStorage.removeItem('room_' + currentRoom);
            }
        });
    </script>
</body>
</html>
