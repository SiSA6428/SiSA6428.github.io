<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaChat — водный мессенджер (РЕАЛЬНЫЙ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- FIREBASE CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        :root { --water-primary: #00d4ff; }
        
        body {
            background: linear-gradient(135deg, #0a2540 0%, #003366 50%, #001f3f 100%);
            background-attachment: fixed;
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        .chat-bubble-me {
            background: linear-gradient(135deg, #00bfff, #0099cc);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 15px rgba(0, 191, 255, 0.3);
        }
        
        .chat-bubble-other {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: white;
            border-radius: 20px 20px 20px 4px;
        }
        
        .water-gradient {
            background: linear-gradient(90deg, #00d4ff, #00ffaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .message-container { scrollbar-width: thin; scrollbar-color: #00d4ff rgba(255,255,255,0.1); }
        
        .wave-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(180deg, transparent 40%, rgba(0, 212, 255, 0.08) 50%, transparent 60%);
            animation: waterFlow 8s linear infinite;
        }
        
        @keyframes waterFlow { 0% { background-position: 0 0; } 100% { background-position: 0 200px; } }
        
        .online-dot { animation: pulse 2s infinite; }
        
        .tail {
            position: absolute; bottom: -2px; right: -8px;
            width: 20px; height: 20px;
            background: linear-gradient(135deg, #00bfff, #0099cc);
            clip-path: polygon(0 0, 100% 100%, 0 100%);
            transform: rotate(45deg);
        }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center overflow-hidden">

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen" class="w-full max-w-md mx-auto glass rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 mb-6 shadow-inner">
                <span class="text-5xl">🌊</span>
            </div>
            <h1 class="text-4xl font-bold water-gradient tracking-tighter">AquaChat</h1>
            <p class="text-cyan-300 mt-2 text-lg">Реальный водный мессенджер</p>
        </div>
        
        <div id="phone-step">
            <label class="block text-sm text-cyan-200 mb-2 font-medium">Номер телефона</label>
            <div class="flex">
                <div class="glass px-5 flex items-center text-cyan-300 font-medium rounded-l-2xl">+7</div>
                <input id="phone-input" type="tel" placeholder="999 123 45 67" 
                       class="flex-1 bg-white/10 border border-white/20 focus:border-cyan-400 rounded-r-2xl px-6 py-5 text-lg outline-none">
            </div>
            <button onclick="nextStep()" 
                    class="mt-8 w-full py-5 rounded-2xl bg-gradient-to-r from-emerald-400 to-cyan-400 font-semibold text-lg active:scale-95">
                Далее
            </button>
        </div>
        
        <div id="code-step" class="hidden">
            <p class="text-center text-cyan-300">Код из SMS</p>
            <p id="phone-display" class="font-mono text-2xl text-center mt-2"></p>
            <div class="flex gap-4 justify-center my-8" id="code-inputs"></div>
            <button onclick="verifyCode()" 
                    class="w-full py-5 rounded-2xl bg-gradient-to-r from-emerald-400 to-cyan-400 font-semibold text-lg active:scale-95">
                Войти в океан
            </button>
        </div>
    </div>

    <!-- ПРИЛОЖЕНИЕ -->
    <div id="app-screen" class="hidden w-full h-screen flex flex-col lg:flex-row">
        <!-- Сайдбар чатов -->
        <div class="w-80 glass border-r border-white/10 flex flex-col h-full">
            <div class="p-5 border-b border-white/10 flex items-center gap-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-3xl">🌊</div>
                <span class="text-3xl font-bold water-gradient">AquaChat</span>
            </div>
            
            <div class="p-4">
                <div class="glass flex items-center gap-3 px-5 py-3 rounded-3xl">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="search-input" onkeyup="filterChats()" type="text" placeholder="Поиск по воде..." 
                           class="flex-1 bg-transparent outline-none">
                </div>
            </div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto px-3 py-2 space-y-1 message-container"></div>
            
            <div class="p-4 border-t border-white/10 text-xs flex justify-between text-cyan-300">
                <div onclick="logout()" class="cursor-pointer hover:text-white flex items-center gap-2">
                    <i class="fa-solid fa-right-from-bracket"></i> Выйти
                </div>
            </div>
        </div>
        
        <!-- ЧАТ -->
        <div class="flex-1 flex flex-col wave-bg relative">
            <div id="chat-header" class="h-16 glass border-b border-white/10 px-6 flex items-center">
                <div id="header-avatar" class="w-10 h-10 text-4xl mr-4"></div>
                <div>
                    <div id="header-name" class="font-semibold text-xl"></div>
                    <div id="header-status" class="text-xs text-emerald-400 flex items-center gap-2"></div>
                </div>
            </div>
            
            <div id="messages-area" class="flex-1 overflow-y-auto p-6 space-y-8 message-container bg-[radial-gradient(#ffffff05_1px,transparent_1px)]"></div>
            
            <!-- ВВОД -->
            <div class="glass border-t border-white/10 p-4">
                <div class="flex gap-3 bg-white/5 rounded-3xl px-5 py-2">
                    <label onclick="document.getElementById('photo-input').click()" class="cursor-pointer w-10 h-10 flex items-center justify-center text-2xl hover:scale-110 transition">
                        📸
                    </label>
                    <input id="photo-input" type="file" accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    
                    <input id="message-input" onkeydown="if(event.key==='Enter') sendMessage()" 
                           type="text" placeholder="Напиши сообщение океану..." 
                           class="flex-1 bg-transparent outline-none text-lg">
                    
                    <button onclick="sendMessage()" 
                            class="w-11 h-11 bg-gradient-to-br from-emerald-400 to-teal-400 rounded-2xl flex items-center justify-center text-xl active:scale-95">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- ПРАВАЯ ПАНЕЛЬ (онлайн друзья) -->
        <div class="w-72 glass border-l border-white/10 hidden lg:flex flex-col p-6">
            <div class="uppercase text-xs tracking-widest text-cyan-300 mb-6">Онлайн в океане</div>
            <div id="online-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- ТОАСТ -->
    <div id="toast" class="hidden fixed bottom-8 right-8 glass px-6 py-4 rounded-3xl flex items-center gap-4 shadow-2xl">
        <i class="fa-solid fa-bell text-emerald-400"></i>
        <div>
            <div id="toast-title" class="font-semibold"></div>
            <div id="toast-text" class="text-sm text-cyan-200"></div>
        </div>
    </div>

    <script>
        // ===================== FIREBASE CONFIG =====================
        // === ЗАМЕНИ ЭТО НА СВОЙ КОНФИГ ИЗ FIREBASE CONSOLE ===
        const firebaseConfig = {
            apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
            authDomain: "aquachat-water.firebaseapp.com",
            databaseURL: "https://aquachat-water-default-rtdb.firebaseio.com",
            projectId: "aquachat-water",
            storageBucket: "aquachat-water.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:xxxxxxxxxxxxxxxx"
        };
        // =======================================================

        let app, auth, db;
        let currentUser = { uid: null, name: "Ты" };
        let currentChatId = null;
        let messagesListener = null;
        let onlineListener = null;
        
        let chats = [
            { id: 1, name: "Общий океан", avatar: "🌊", lastMsg: "Присоединяйся!", time: "только что", messages: [] },
            { id: 2, name: "Друзья-дайверы", avatar: "🐬", lastMsg: "", time: "", messages: [] },
            { id: 3, name: "Морские приключения", avatar: "🧜‍♀️", lastMsg: "", time: "", messages: [] }
        ];

        function initFirebase() {
            if (app) return;
            app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.database();
        }

        function nextStep() {
            const phone = document.getElementById("phone-input").value.trim();
            if (!phone) return alert("Введи номер!");
            document.getElementById("phone-display").textContent = "+7 " + phone;
            document.getElementById("phone-step").classList.add("hidden");
            document.getElementById("code-step").classList.remove("hidden");
            
            const container = document.getElementById("code-inputs");
            container.innerHTML = "";
            for (let i = 0; i < 4; i++) {
                const inp = document.createElement("input");
                inp.maxLength = 1;
                inp.className = "w-14 h-16 text-5xl text-center bg-white/10 border border-white/30 rounded-3xl focus:border-emerald-400 outline-none";
                inp.oninput = () => { if (inp.value && inp.nextElementSibling) inp.nextElementSibling.focus(); };
                container.appendChild(inp);
            }
            container.children[0].focus();
        }

        async function verifyCode() {
            const code = Array.from(document.getElementById("code-inputs").children).map(i => i.value).join("");
            if (code.length !== 4) return alert("Введи 4 цифры");
            
            initFirebase();
            
            try {
                const cred = await auth.signInAnonymously();
                currentUser.uid = cred.user.uid;
                currentUser.name = prompt("Как тебя зовут в океане? 🌊", "Водный странник") || "Аноним";
                
                // Показываем приложение
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("app-screen").classList.remove("hidden");
                
                setupPresence();
                renderChatList();
                openChat(1); // открываем первый чат
                
                showToast("Добро пожаловать в океан!", "Сообщения теперь реальные!");
            } catch (e) {
                alert("Ошибка входа: " + e.message);
            }
        }

        function setupPresence() {
            const connectedRef = db.ref(".info/connected");
            const presenceRef = db.ref("online/" + currentUser.uid);
            
            connectedRef.on("value", (snap) => {
                if (snap.val() === true) {
                    presenceRef.set({ name: currentUser.name, timestamp: Date.now() });
                    presenceRef.onDisconnect().remove();
                }
            });
            
            // Слушаем онлайн
            if (onlineListener) onlineListener.off();
            onlineListener = db.ref("online");
            onlineListener.on("value", (snap) => {
                const listHTML = [];
                snap.forEach(child => {
                    if (child.key !== currentUser.uid) {
                        listHTML.push(`
                            <div class="flex items-center gap-3">
                                <span class="w-3 h-3 bg-emerald-400 rounded-full online-dot"></span>
                                <span class="text-cyan-100">${child.val().name}</span>
                            </div>
                        `);
                    }
                });
                document.getElementById("online-list").innerHTML = listHTML.length ? listHTML.join("") : "<p class='text-cyan-400 text-sm'>Пока никого...</p>";
            });
        }

        function renderChatList() {
            const container = document.getElementById("chat-list");
            container.innerHTML = "";
            chats.forEach(chat => {
                const div = document.createElement("div");
                div.className = `group flex items-center gap-4 px-5 py-4 rounded-3xl hover:bg-white/10 cursor-pointer transition-all ${currentChatId === chat.id ? 'bg-white/15' : ''}`;
                div.onclick = () => openChat(chat.id);
                div.innerHTML = `
                    <div class="w-12 h-12 text-4xl flex items-center justify-center bg-white/10 rounded-2xl">${chat.avatar}</div>
                    <div class="flex-1 min-w-0">
                        <div class="font-medium truncate">${chat.name}</div>
                        <div class="text-sm text-cyan-200/70 truncate">${chat.lastMsg || "Начни разговор"}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function openChat(id) {
            currentChatId = id;
            renderChatList();
            
            const chat = chats.find(c => c.id === id);
            document.getElementById("header-avatar").innerHTML = chat.avatar;
            document.getElementById("header-name").textContent = chat.name;
            document.getElementById("header-status").innerHTML = `<span class="w-2 h-2 bg-emerald-400 rounded-full online-dot"></span> онлайн чат`;
            
            const area = document.getElementById("messages-area");
            area.innerHTML = "";
            
            // Снимаем старый слушатель
            if (messagesListener) messagesListener.off();
            
            const ref = db.ref(`chats/${id}/messages`);
            messagesListener = ref;
            
            // Загружаем все существующие сообщения
            ref.once("value", (snap) => {
                const data = snap.val() || {};
                chat.messages = [];
                Object.keys(data).forEach(key => {
                    const m = data[key];
                    chat.messages.push({
                        id: key,
                        fromMe: m.fromUid === currentUser.uid,
                        fromName: m.fromName,
                        text: m.text,
                        url: m.url,
                        time: m.time,
                        type: m.type || "text"
                    });
                });
                renderCurrentChat();
            });
            
            // Реал-тайм новые сообщения
            ref.on("child_added", (snap) => {
                const m = snap.val();
                if (!chat.messages.find(msg => msg.id === snap.key)) {
                    const newMsg = {
                        id: snap.key,
                        fromMe: m.fromUid === currentUser.uid,
                        fromName: m.fromName,
                        text: m.text,
                        url: m.url,
                        time: m.time,
                        type: m.type || "text"
                    };
                    chat.messages.push(newMsg);
                    if (currentChatId === id) renderCurrentChat();
                    chat.lastMsg = m.text || "📸 Фото";
                    chat.time = m.time;
                    renderChatList();
                }
            });
        }

        function renderCurrentChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;
            const area = document.getElementById("messages-area");
            area.innerHTML = "";
            
            chat.messages.forEach(msg => {
                const bubble = document.createElement("div");
                bubble.className = `max-w-[75%] ${msg.fromMe ? "ml-auto" : ""}`;
                
                if (msg.type === "image") {
                    bubble.innerHTML = `
                        <div class="${msg.fromMe ? "chat-bubble-me" : "chat-bubble-other"} p-2 rounded-3xl">
                            <img src="${msg.url}" class="rounded-2xl max-w-[280px]">
                            <div class="text-[10px] text-right mt-1 opacity-70">${msg.time} • ${msg.fromName}</div>
                        </div>
                    `;
                } else {
                    bubble.innerHTML = `
                        <div class="${msg.fromMe ? "chat-bubble-me px-6 py-4" : "chat-bubble-other px-6 py-4"} relative">
                            \( {msg.fromMe ? "" : `<div class="text-xs text-cyan-300 mb-1"> \){msg.fromName}</div>`}
                            ${msg.text}
                            ${msg.fromMe ? `<div class="tail"></div>` : ""}
                            <div class="text-[10px] text-right mt-1 opacity-70">${msg.time}</div>
                        </div>
                    `;
                }
                area.appendChild(bubble);
            });
            area.scrollTop = area.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById("message-input");
            const text = input.value.trim();
            if (!text || !currentChatId) return;
            
            const now = new Date().toLocaleTimeString("ru-RU", {hour:"2-digit", minute:"2-digit"});
            const chat = chats.find(c => c.id === currentChatId);
            
            const msgData = {
                fromUid: currentUser.uid,
                fromName: currentUser.name,
                text: text,
                time: now,
                type: "text"
            };
            
            // Мгновенно показываем у себя
            chat.messages.push({
                id: Date.now(),
                fromMe: true,
                fromName: currentUser.name,
                text: text,
                time: now,
                type: "text"
            });
            renderCurrentChat();
            chat.lastMsg = text.length > 30 ? text.substring(0,27)+"..." : text;
            chat.time = now;
            renderChatList();
            
            // Отправляем в Firebase
            db.ref(`chats/${currentChatId}/messages`).push(msgData);
            
            input.value = "";
        }

        function handlePhotoUpload(e) {
            const file = e.target.files[0];
            if (!file || !currentChatId) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const now = new Date().toLocaleTimeString("ru-RU", {hour:"2-digit", minute:"2-digit"});
                const chat = chats.find(c => c.id === currentChatId);
                
                const msgData = {
                    fromUid: currentUser.uid,
                    fromName: currentUser.name,
                    url: ev.target.result,
                    time: now,
                    type: "image"
                };
                
                // Мгновенно показываем
                chat.messages.push({
                    id: Date.now(),
                    fromMe: true,
                    fromName: currentUser.name,
                    url: ev.target.result,
                    time: now,
                    type: "image"
                });
                renderCurrentChat();
                chat.lastMsg = "📸 Фото";
                chat.time = now;
                renderChatList();
                
                // В Firebase
                db.ref(`chats/${currentChatId}/messages`).push(msgData);
            };
            reader.readAsDataURL(file);
        }

        function filterChats() {
            const term = document.getElementById("search-input").value.toLowerCase();
            document.querySelectorAll("#chat-list > div").forEach(el => {
                el.style.display = el.textContent.toLowerCase().includes(term) ? "flex" : "none";
            });
        }

        function showToast(title, text) {
            const t = document.getElementById("toast");
            document.getElementById("toast-title").textContent = title;
            document.getElementById("toast-text").textContent = text;
            t.classList.remove("hidden");
            setTimeout(() => t.classList.add("hidden"), 3500);
        }

        function logout() {
            if (auth) auth.signOut();
            location.reload();
        }

        // Запуск
        window.onload = () => {
            console.log("%c🌊 AquaChat РЕАЛЬНЫЙ готов! Замени Firebase config и запускай", "color:#00ffcc; font-size:14px");
            // Можно сразу открыть приложение для теста (убери комментарий ниже)
            // document.getElementById("login-screen").classList.add("hidden");
            // document.getElementById("app-screen").classList.remove("hidden");
        };
    </script>
</body>
</html>
