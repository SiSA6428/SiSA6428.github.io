<!DOCTYPE html>
<html>
<head>
    <title>Anom Web 1.3</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 15px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ff9d;
        }
        
        .header .version {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .security-badge {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 8px;
            margin: 15px 0;
            font-size: 12px;
            text-align: center;
            color: #00cc7a;
        }
        
        .room-section {
            margin: 20px 0;
        }
        
        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            margin: 5px 0 15px 0;
            border-radius: 5px;
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
        
        button {
            width: 100%;
            background: transparent;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            margin: 5px 0;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .message {
            margin: 8px 0;
            word-break: break-word;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .system-message {
            color: #666;
            text-align: center;
            font-size: 12px;
            margin: 10px 0;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;
            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM WEB</h1>
            <div class="version">version 1.3 // build 2026</div>
        </div>
        
        <div class="security-badge">
            ⚡ EPHEMERAL PROTOCOL ⚡<br>
            messages self-destruct on page refresh<br>
            no history // no logs // no trace
        </div>
        
        <div class="room-section">
            <input type="text" id="roomCode" placeholder="[enter room key]" maxlength="20">
            <button onclick="joinRoom()">> CONNECT _</button>
        </div>
        
        <div id="chatArea" class="chat-area">
            <div class="messages" id="messages"></div>
            
            <input type="text" id="messageInput" placeholder="[type message]" maxlength="500">
            <button onclick="sendMessage()">> SEND _</button>
            
            <div class="status" id="status">[system ready]</div>
        </div>
        
        <div class="footer">
            [PER-ANOM 1.3] // [END-TO-END TEMPORARY] // [NO STORAGE]
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script>
        // 🔐 ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE (Замени этот объект)
        const firebaseConfig = {
            apiKey: "AIzaSyBx1JATLdFSxUHkZLE-jvDfF_jkYx-t1FA",
            authDomain: "anom-web.firebaseapp.com",
            databaseURL: "https://anom-web-default-rtdb.firebaseio.com",
            projectId: "anom-web",
            storageBucket: "anom-web.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Global variables
        let currentRoom = null;
        let username = 'user_' + Math.random().toString(36).substr(2, 6);
        let messageListener = null;
        
        // Join room function
        function joinRoom() {
            const roomCode = document.getElementById('roomCode').value.trim();
            
            if (!roomCode) {
                alert('[ERROR] room key required');
                return;
            }
            
            // Clean up previous listener
            if (messageListener) {
                messageListener.off();
            }
            
            currentRoom = roomCode;
            
            // Show chat area
            document.getElementById('chatArea').style.display = 'block';
            document.getElementById('messages').innerHTML = '';
            
            // Update status
            document.getElementById('status').innerText = '[connected to room: ' + roomCode + ']';
            
            // Add system message
            addSystemMessage('connected to room [' + roomCode + ']');
            addSystemMessage('all messages are temporary');
            
            // Listen for messages
            const roomRef = database.ref('rooms/' + roomCode + '/messages');
            
            messageListener = roomRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                displayMessage(msg);
            });
        }
        
        // Send message function
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (!message || !currentRoom) {
                alert('[ERROR] join room first');
                return;
            }
            
            // Create message object
            const messageObj = {
                text: message,
                user: username,
                time: Date.now(),
                id: Math.random().toString(36).substr(2, 9)
            };
            
            // Save to Firebase
            const roomRef = database.ref('rooms/' + currentRoom + '/messages');
            roomRef.push(messageObj);
            
            // Clear input
            messageInput.value = '';
        }
        
        // Display message in chat
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            
            const time = new Date(msg.time).toLocaleTimeString();
            
            messageElement.innerHTML = `
                <strong>[${msg.user}]</strong> 
                <span style="color:#888;">${time}</span><br>
                ${msg.text}
            `;
            
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Add system message
        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const systemElement = document.createElement('div');
            systemElement.className = 'system-message';
            systemElement.innerHTML = '>>> ' + text + ' <<<';
            messagesDiv.appendChild(systemElement);
        }
        
        // Handle Enter key
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        document.getElementById('roomCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinRoom();
            }
        });
        
        // Warn on refresh
        window.addEventListener('beforeunload', function (e) {
            if (currentRoom) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
        
        console.log('ANOM WEB 1.3 // SYSTEM READY');
    </script>
</body>
</html>
