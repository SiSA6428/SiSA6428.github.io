<!DOCTYPE html>
<html>
<head>
    <title>ANOM CONNECT</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            padding: 15px;
        }
        
        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 10px;
        }
        
        .header h1 {
            font-size: 24px;
            letter-spacing: 3px;
        }
        
        button {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            margin: 5px 0;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        button:disabled {
            opacity: 0.3;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        
        .btn-group button {
            flex: 1;
        }
        
        textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border-radius: 5px;
            margin: 5px 0;
            resize: vertical;
            min-height: 80px;
        }
        
        .status {
            background: #0d0d0d;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            margin: 10px 0;
        }
        
        .connected { border-color: #00ff9d; color: #00ff9d; }
        
        .chat-container {
            display: none;
        }
        
        .chat-container.active {
            display: block;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin: 20px 0;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px;
            background: #0d0d0d;
            border-left: 3px solid #00ff9d;
        }
        
        .message.own {
            border-left-color: #ff6b6b;
            background: #1a0d0d;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            border-radius: 5px;
        }
        
        .input-group button {
            width: auto;
            padding: 12px 20px;
            margin: 0;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: auto;
            padding: 8px 15px;
            font-size: 11px;
        }
        
        .step {
            margin-bottom: 20px;
            padding: 15px;
            background: #0d1a0d;
            border-radius: 8px;
        }
        
        .step h3 {
            color: #00ff9d;
            margin-bottom: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔵 ANOM CONNECT</h1>
            <button class="back-btn" id="backBtn" onclick="resetAll()" style="display: none;">← НАЗАД</button>
        </div>
        
        <div id="connectPanel">
            <div class="step">
                <h3>ВЫБЕРИТЕ РОЛЬ</h3>
                <div class="btn-group">
                    <button onclick="startHost()" id="hostBtn">СОЗДАТЬ</button>
                    <button onclick="startJoin()" id="joinBtn">ПОДКЛЮЧИТЬСЯ</button>
                </div>
            </div>
            
            <div id="hostBlock" style="display: none;">
                <div class="step">
                    <h3>КОД КОМНАТЫ (отправьте другу)</h3>
                    <textarea id="offerText" readonly></textarea>
                    <button onclick="copyText('offerText')">КОПИРОВАТЬ</button>
                    <div class="status" id="hostStatus">Создание комнаты...</div>
                </div>
                
                <div class="step">
                    <h3>ВСТАВЬТЕ КОД ОТВЕТА</h3>
                    <textarea id="answerText" placeholder="Вставьте код от друга..."></textarea>
                    <button onclick="processAnswer()" id="answerBtn" disabled>ПОДКЛЮЧИТЬ</button>
                </div>
            </div>
            
            <div id="joinBlock" style="display: none;">
                <div class="step">
                    <h3>ВСТАВЬТЕ КОД КОМНАТЫ</h3>
                    <textarea id="remoteOfferText" placeholder="Вставьте код от хоста..."></textarea>
                    <button onclick="processOffer()" id="offerBtn" disabled>СОЗДАТЬ ОТВЕТ</button>
                    <div class="status" id="joinStatus">Ожидание кода...</div>
                </div>
            </div>
        </div>
        
        <div id="chatBlock" class="chat-container">
            <div class="messages" id="messageList"></div>
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key=='Enter') sendMsg()">
                <button onclick="sendMsg()">➤</button>
            </div>
            <div class="btn-group">
                <button onclick="selectPhoto()">📷 ФОТО</button>
                <button onclick="selectFile()">📎 ФАЙЛ</button>
            </div>
            <input type="file" id="filePicker" style="display: none;" onchange="handleFile(this)">
            <div class="status" id="chatStatus">Ожидание подключения...</div>
        </div>
    </div>

    <script>
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let pc = null;
        let dc = null;
        let isCreator = false;
        let userName = 'user_' + Math.floor(Math.random() * 9999);
        let localCandidates = [];
        
        // STUN серверы
        const iceConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 0
        };
        
        // ========== ХОСТ ==========
        function startHost() {
            isCreator = true;
            document.getElementById('hostBtn').disabled = true;
            document.getElementById('joinBtn').disabled = true;
            document.getElementById('hostBlock').style.display = 'block';
            document.getElementById('joinBlock').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            
            createConnection(true);
        }
        
        // ========== УЧАСТНИК ==========
        function startJoin() {
            isCreator = false;
            document.getElementById('hostBtn').disabled = true;
            document.getElementById('joinBtn').disabled = true;
            document.getElementById('joinBlock').style.display = 'block';
            document.getElementById('hostBlock').style.display = 'none';
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('joinStatus').innerHTML = 'Вставьте код от хоста';
        }
        
        // ========== СОЗДАНИЕ СОЕДИНЕНИЯ ==========
        async function createConnection(isOffer) {
            try {
                pc = new RTCPeerConnection(iceConfig);
                localCandidates = [];
                
                // Собираем кандидаты
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        localCandidates.push(e.candidate);
                        if (isOffer) {
                            document.getElementById('hostStatus').innerHTML = `Найдено путей: ${localCandidates.length}`;
                        }
                    }
                };
                
                pc.oniceconnectionstatechange = () => {
                    console.log('ICE state:', pc.iceConnectionState);
                    if (pc.iceConnectionState === 'connected') {
                        document.getElementById('chatStatus').innerHTML = '✅ ПОДКЛЮЧЕНО';
                        document.getElementById('chatStatus').className = 'status connected';
                    }
                };
                
                if (isOffer) {
                    // Хост: создаем канал
                    dc = pc.createDataChannel('main');
                    setupChannel(dc);
                    
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    
                    // Ждем кандидатов и создаем код
                    setTimeout(() => {
                        if (pc.localDescription) {
                            const codeData = {
                                sdp: pc.localDescription.sdp,
                                candidates: localCandidates
                            };
                            const code = btoa(JSON.stringify(codeData));
                            document.getElementById('offerText').value = code;
                            document.getElementById('hostStatus').innerHTML = '✅ Код готов, отправьте другу';
                        }
                    }, 2000);
                }
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        // ========== УЧАСТНИК: ОБРАБОТКА OFFER ==========
        async function processOffer() {
            const offerCode = document.getElementById('remoteOfferText').value.trim();
            if (!offerCode) return;
            
            try {
                document.getElementById('joinStatus').innerHTML = 'Обработка...';
                
                const offerData = JSON.parse(atob(offerCode));
                
                pc = new RTCPeerConnection(iceConfig);
                localCandidates = [];
                
                pc.onicecandidate = (e) => {
                    if (e.candidate) {
                        localCandidates.push(e.candidate);
                        document.getElementById('joinStatus').innerHTML = `Найдено путей: ${localCandidates.length}`;
                    }
                };
                
                pc.ondatachannel = (e) => {
                    dc = e.channel;
                    setupChannel(dc);
                };
                
                pc.oniceconnectionstatechange = () => {
                    if (pc.iceConnectionState === 'connected') {
                        document.getElementById('chatStatus').innerHTML = '✅ ПОДКЛЮЧЕНО';
                    }
                };
                
                // Устанавливаем удаленное описание
                await pc.setRemoteDescription({ type: 'offer', sdp: offerData.sdp });
                
                // Добавляем кандидаты хоста
                if (offerData.candidates) {
                    for (let c of offerData.candidates) {
                        try {
                            await pc.addIceCandidate(new RTCIceCandidate(c));
                        } catch (e) {}
                    }
                }
                
                // Создаем ответ
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                // Ждем кандидатов и создаем код ответа
                setTimeout(() => {
                    if (pc.localDescription) {
                        const answerData = {
                            sdp: pc.localDescription.sdp,
                            candidates: localCandidates
                        };
                        const answerCode = btoa(JSON.stringify(answerData));
                        
                        document.getElementById('remoteOfferText').value = answerCode;
                        document.getElementById('joinStatus').innerHTML = '✅ Код ответа готов, отправьте хосту';
                        
                        navigator.clipboard.writeText(answerCode);
                        alert('Код скопирован! Отправьте его хосту');
                        
                        // Показываем чат
                        showChat();
                    }
                }, 2000);
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        // ========== ХОСТ: ОБРАБОТКА ANSWER ==========
        async function processAnswer() {
            const answerCode = document.getElementById('answerText').value.trim();
            if (!answerCode) return;
            
            try {
                document.getElementById('hostStatus').innerHTML = 'Подключение...';
                
                const answerData = JSON.parse(atob(answerCode));
                
                await pc.setRemoteDescription({ type: 'answer', sdp: answerData.sdp });
                
                if (answerData.candidates) {
                    for (let c of answerData.candidates) {
                        try {
                            await pc.addIceCandidate(new RTCIceCandidate(c));
                        } catch (e) {}
                    }
                }
                
                document.getElementById('hostStatus').innerHTML = '✅ Подключение установлено';
                
                // Показываем чат
                showChat();
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }
        
        // ========== НАСТРОЙКА КАНАЛА ==========
        function setupChannel(channel) {
            channel.onopen = () => {
                addSystemMessage('✅ Подключено!');
                showChat();
            };
            
            channel.onclose = () => {
                addSystemMessage('❌ Отключено');
            };
            
            channel.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    showMessage(data);
                } catch (err) {
                    showMessage({ user: 'system', text: e.data });
                }
            };
        }
        
        // ========== ЧАТ ==========
        function showChat() {
            document.getElementById('connectPanel').style.display = 'none';
            document.getElementById('chatBlock').classList.add('active');
        }
        
        function sendMsg() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !dc || dc.readyState !== 'open') return;
            
            const msg = {
                user: userName,
                text: text,
                time: Date.now()
            };
            
            dc.send(JSON.stringify(msg));
            showMessage(msg);
            input.value = '';
        }
        
        function showMessage(msg) {
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            const time = new Date(msg.time).toLocaleTimeString();
            
            div.className = 'message' + (msg.user === userName ? ' own' : '');
            div.innerHTML = `<strong>${escapeHtml(msg.user)}</strong> <small>${time}</small><br>${escapeHtml(msg.text)}`;
            
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.color = '#ffaa00';
            div.style.padding = '10px';
            div.innerHTML = text;
            list.appendChild(div);
        }
        
        // ========== ФАЙЛЫ ==========
        function selectPhoto() {
            let input = document.getElementById('filePicker');
            input.accept = 'image/*';
            input.click();
        }
        
        function selectFile() {
            let input = document.getElementById('filePicker');
            input.accept = '*/*';
            input.click();
        }
        
        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (file.size > 10 * 1024 * 1024) {
                alert('Файл больше 10MB');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const msg = {
                    user: userName,
                    text: `[Файл: ${file.name}]`,
                    file: e.target.result,
                    fileName: file.name,
                    time: Date.Now()
                };
                
                if (dc && dc.readyState === 'open') {
                    dc.send(JSON.stringify(msg));
                    showMessage(msg);
                }
            };
            
            if (file.type.startsWith('image/')) {
                reader.readAsDataURL(file);
            } else {
                reader.readAsArrayBuffer(file);
            }
        }
        
        // ========== УТИЛИТЫ ==========
        function copyText(id) {
            const text = document.getElementById(id).value;
            navigator.clipboard.writeText(text);
            alert('Скопировано!');
        }
        
        function escapeHtml(text) {
            return String(text).replace(/[&<>"]/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m];
            });
        }
        
        function resetAll() {
            if (pc) pc.close();
            pc = null;
            dc = null;
            
            document.getElementById('connectPanel').style.display = 'block';
            document.getElementById('chatBlock').classList.remove('active');
            document.getElementById('backBtn').style.display = 'none';
            
            document.getElementById('hostBtn').disabled = false;
            document.getElementById('joinBtn').disabled = false;
            
            document.getElementById('hostBlock').style.display = 'none';
            document.getElementById('joinBlock').style.display = 'none';
            
            document.getElementById('offerText').value = '';
            document.getElementById('answerText').value = '';
            document.getElementById('remoteOfferText').value = '';
            document.getElementById('messageList').innerHTML = '';
            
            document.getElementById('hostStatus').innerHTML = 'Создание комнаты...';
            document.getElementById('joinStatus').innerHTML = 'Ожидание кода...';
        }
        
        // Активация кнопок
        document.getElementById('remoteOfferText').addEventListener('input', function() {
            document.getElementById('offerBtn').disabled = !this.value.trim();
        });
        
        document.getElementById('answerText').addEventListener('input', function() {
            document.getElementById('answerBtn').disabled = !this.value.trim();
        });
    </script>
</body>
</html>
