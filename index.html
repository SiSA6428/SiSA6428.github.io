<!DOCTYPE html>
<html>
<head>
    <title>Anom Web 1.3</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 15px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px #00ff9d;
        }
        
        .header .version {
            color: #666;
            font-size: 14px;            margin-top: 5px;
        }
        
        .security-badge {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 8px;
            margin: 15px 0;
            font-size: 12px;
            text-align: center;
            color: #00cc7a;
        }
        
        .user-info {
            background: #1a1a1a;
            border: 1px dashed #00ff9d;
            padding: 8px 12px;
            margin: 10px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-tag {
            color: #00cc7a;
            font-weight: bold;
        }
        
        .room-section {
            margin: 20px 0;
        }
        
        input, textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 5px 0 15px 0;
            border-radius: 5px;
        }
        
        textarea {
            height: 80px;
            resize: vertical;
        }
                input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
        
        button {
            width: 100%;
            background: transparent;
            border: 2px solid #00ff9d;
            color: #00ff9d;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            margin: 5px 0;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .message {
            margin: 8px 0;
            word-break: break-word;
            padding: 4px 0;            border-bottom: 1px solid #1a1a1a;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .join-message {
            color: #ffaa00;
            text-align: center;
            font-size: 12px;
            margin: 8px 0;
            padding: 4px;
            background: rgba(255, 170, 0, 0.1);
            border-left: 3px solid #ffaa00;
            font-style: italic;
        }
        
        .system-message {
            color: #666;
            text-align: center;
            font-size: 12px;
            margin: 10px 0;
        }
        
        .connection-info {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        
        .peer-list {
            margin: 10px 0;
            padding: 5px;
            max-height: 100px;
            overflow-y: auto;
        }
        
        .peer-item {
            color: #00cc7a;
            padding: 3px 0;
            font-size: 12px;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
        
        .room-key-display {
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
            color: #00ff9d;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM WEB</h1>
            <div class="version">version 1.3 // p2p build</div>
        </div>
        
        <div class="security-badge">
            ⚡ P2P EPHEMERAL PROTOCOL ⚡<br>
            direct connection // no servers // no logs<br>
            messages self-destruct on page refresh
        </div>
        
        <div class="user-info">
            <span>🔐 your id:</span>
            <span class="user-tag" id="userDisplay">agent_</span>
        </div>
        
        <!-- Connection Info -->
        <div class="connection-info" id="connectionInfo">
            <div style="text-align: center; margin-bottom: 10px;">
                <strong>[ CONNECTION STATUS ]</strong>
            </div>
            <div id="connectionStatus" style="color: #ffaa00; text-align: center;">
                not connected
            </div>
            <div class="peer-list" id="peerList"></div>
        </div>
                <!-- Room Section -->
        <div class="room-section" id="roomSection">
            <input type="text" id="roomCode" placeholder="[enter room name]" maxlength="30">
            <button onclick="createOrJoinRoom()">> CREATE/JOIN ROOM _</button>
        </div>
        
        <!-- Share Section -->
        <div class="room-section" id="shareSection" style="display: none;">
            <div class="room-key-display" id="roomKeyDisplay"></div>
            <textarea id="peerInput" placeholder="[paste peer connection key here]"></textarea>
            <button onclick="connectToPeer()">> CONNECT PEER _</button>
            <button onclick="copyRoomKey()">> COPY KEY _</button>
        </div>
        
        <!-- Chat Area -->
        <div id="chatArea" class="chat-area">
            <div class="messages" id="messages"></div>
            
            <input type="text" id="messageInput" placeholder="[type message]" maxlength="500">
            <button onclick="sendMessage()" id="sendButton" disabled>> SEND _</button>
            
            <div class="status" id="status">[waiting for peers...]</div>
        </div>
        
        <div class="footer">
            [PER-ANOM 1.3] // [P2P] // [NO STORAGE]
        </div>
    </div>

    <!-- Simple Peer for WebRTC -->
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    
    <script>
        // Generate random username
        const username = 'agent_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        document.getElementById('userDisplay').innerText = username;
        
        // Global variables
        let currentRoom = null;
        let peers = {};
        let connections = [];
        let isInitiator = false;
        let peerNames = {}; // Хранит имена пиров
        
        // Display functions
        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const systemElement = document.createElement('div');
            systemElement.className = 'system-message';
            systemElement.innerHTML = '>>> ' + text + ' <<<';            messagesDiv.appendChild(systemElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addJoinMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const joinElement = document.createElement('div');
            joinElement.className = 'join-message';
            joinElement.innerHTML = '➤ ' + text;
            messagesDiv.appendChild(joinElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function displayMessage(text, from) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            
            const time = new Date().toLocaleTimeString();
            
            messageElement.innerHTML = `
                <strong>[${from}]</strong> 
                <span style="color:#888;">${time}</span><br>
                ${text}
            `;
            
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Peer connection handling
        function createOrJoinRoom() {
            const roomName = document.getElementById('roomCode').value.trim();
            if (!roomName) {
                alert('[ERROR] enter room name');
                return;
            }
            
            currentRoom = roomName;
            
            // Show share section
            document.getElementById('roomSection').style.display = 'none';
            document.getElementById('shareSection').style.display = 'block';
            document.getElementById('chatArea').style.display = 'block';
            
            // Create room key (signal data)
            const roomKey = btoa(JSON.stringify({
                room: roomName,
                user: username,
                time: Date.now()            }));
            
            document.getElementById('roomKeyDisplay').innerText = roomKey;
            addSystemMessage('room created: ' + roomName);
            
            // Enable send button when peers connect
            checkPeers();
        }
        
        function connectToPeer() {
            const peerKey = document.getElementById('peerInput').value.trim();
            if (!peerKey) return;
            
            try {
                const peerData = JSON.parse(atob(peerKey));
                
                // Создаем пира
                const peer = new SimplePeer({
                    initiator: false,
                    trickle: false
                });
                
                // Сохраняем имя пира
                peerNames[peer._id] = peerData.user || 'unknown';
                
                // Отображаем сообщение о подключении
                addJoinMessage(`${peerData.user} connected`);
                
                peer.on('signal', data => {
                    // Send signal back
                    const responseKey = btoa(JSON.stringify({
                        type: 'signal',
                        data: data,
                        user: username
                    }));
                    document.getElementById('peerInput').value = responseKey;
                });
                
                peer.on('data', data => {
                    const message = data.toString();
                    const peerName = peerNames[peer._id] || 'unknown';
                    displayMessage(message, peerName);
                });
                
                peer.on('connect', () => {
                    addJoinMessage('secure connection established');
                    document.getElementById('sendButton').disabled = false;
                    document.getElementById('status').innerText = '[connected to peer]';
                    checkPeers(); // Обновляем список пиров
                });                
                peer.on('close', () => {
                    const peerName = peerNames[peer._id] || 'unknown';
                    addJoinMessage(`${peerName} disconnected`);
                    delete peerNames[peer._id];
                    connections = connections.filter(p => p !== peer);
                    checkPeers(); // Обновляем список пиров
                });
                
                peer.on('error', err => {
                    console.error('Peer error:', err);
                });
                
                // Simulate receiving signal
                setTimeout(() => {
                    if (peerData.type === 'signal') {
                        peer.signal(peerData.data);
                    }
                }, 100);
                
                connections.push(peer);
                
            } catch (e) {
                alert('[ERROR] invalid connection key');
            }
        }
        
        function copyRoomKey() {
            const key = document.getElementById('roomKeyDisplay').innerText;
            navigator.clipboard.writeText(key).then(() => {
                alert('[KEY COPIED] send to friend');
            });
        }
        
        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message = messageInput.value.trim();
            
            if (!message) return;
            if (connections.length === 0) {
                alert('[ERROR] no peers connected');
                return;
            }
            
            // Display own message
            displayMessage(message, username);
            
            // Send to all peers
            connections.forEach(peer => {
                if (peer.connected) {                    peer.send(message);
                }
            });
            
            messageInput.value = '';
        }
        
        function checkPeers() {
            // Update peer list
            const peerListDiv = document.getElementById('peerList');
            peerListDiv.innerHTML = '';
            
            if (connections.length > 0) {
                document.getElementById('sendButton').disabled = false;
                document.getElementById('status').innerText = '[connected to ' + connections.length + ' peer(s)]';
                
                connections.forEach((peer, index) => {
                    const peerName = peerNames[peer._id] || 'unknown';
                    const peerItem = document.createElement('div');
                    peerItem.className = 'peer-item';
                    peerItem.innerHTML = `▶ ${peerName} [active]`;
                    peerListDiv.appendChild(peerItem);
                });
            } else {
                document.getElementById('sendButton').disabled = true;
                document.getElementById('status').innerText = '[waiting for peers...]';
            }
        }
        
        // Handle Enter key
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Warn on refresh
        window.addEventListener('beforeunload', function (e) {
            if (currentRoom) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
        
        console.log('ANOM WEB 1.3 P2P // READY');
    </script>
</body>
</html>
