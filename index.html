<!DOCTYPE html>
<html>
<head>
    <title>ANOM 1.5</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            color: #00ff9d;
            padding: 15px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            border: 2px solid #00ff9d;
            border-radius: 10px;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff9d;
            padding-bottom: 10px;
        }
        
        .header h1 {
            font-size: 32px;
            letter-spacing: 4px;
        }
        
        .user-info {
            background: #1a1a1a;
            border: 1px dashed #00ff9d;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        
        input, button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            border-radius: 5px;
        }
        
        button {
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        .chat-area {
            display: none;
            margin-top: 20px;
        }
        
        .messages {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin: 10px 0;
            font-size: 14px;
        }
        
        .message {
            margin: 5px 0;
            padding: 8px;
            border-bottom: 1px solid #333;
            word-wrap: break-word;
        }
        
        .message strong {
            color: #00cc7a;
        }
        
        .join-message {
            color: #ffaa00;
            text-align: center;
            font-style: italic;
            margin: 5px 0;
        }
        
        .status {
            color: #00cc7a;
            font-size: 12px;
            text-align: right;
            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            padding-top: 10px;
        }
        
        .simple-note {
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            padding: 15px;
            margin: 15px 0;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
        
        .file-input-container {
            margin: 5px 0;
            position: relative;
        }
        
        .file-input-label {
            display: block;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            text-align: center;
            cursor: pointer;
            border-radius: 5px;
        }
        
        .file-input-label:hover {
            background: #00ff9d;
            color: #0a0a0a;
        }
        
        input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 0.1px;
            height: 0.1px;
        }
        
        .photo-message {
            max-width: 200px;
            max-height: 200px;
            margin: 5px 0;
            border: 1px solid #00ff9d;
            border-radius: 3px;
            cursor: pointer;
        }
        
        .photo-message:hover {
            opacity: 0.8;
        }
        
        .message-content {
            margin-top: 5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border: 3px solid #00ff9d;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #00ff9d;
            font-size: 30px;
            cursor: pointer;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin: 5px 0;
        }
        
        .action-buttons button {
            flex: 1;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ANOM 1.5</h1>
            <div class="version">with photo support</div>
        </div>
        
        <div class="user-info">
            <span>👤 you:</span>
            <span class="user-tag" id="userDisplay"></span>
        </div>
        
        <div class="simple-note" id="note">
            ⚡ 1. Enter room name ⚡<br>
            ⚡ 2. Start chatting ⚡<br>
            ⚡ 3. Click 📷 to send photos ⚡<br>
            ⚡ 4. Messages disappear on refresh ⚡
        </div>
        
        <!-- Room input -->
        <input type="text" id="roomInput" placeholder="room name (any word)" maxlength="30">
        <button onclick="joinRoom()">> JOIN ROOM _</button>
        
        <!-- Chat area -->
        <div id="chatArea" class="chat-area">
            <div class="messages" id="messages"></div>
            
            <div class="action-buttons">
                <button onclick="showFileInput()">📷 PHOTO</button>
                <button onclick="toggleTextInput()">💬 TEXT</button>
            </div>
            
            <div id="textInputContainer" style="display: block;">
                <input type="text" id="messageInput" placeholder="type message">
                <button onclick="sendMessage()">> SEND _</button>
            </div>
            
            <div id="photoInputContainer" style="display: none;">
                <div class="file-input-container">
                    <label for="photoInput" class="file-input-label">📷 SELECT PHOTO</label>
                    <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
                </div>
                <div id="photoPreview" style="display: none; margin: 10px 0;">
                    <img id="previewImage" style="max-width: 100%; max-height: 150px; border: 1px solid #00ff9d;">
                    <button onclick="sendPhoto()">> SEND PHOTO _</button>
                    <button onclick="cancelPhoto()" style="background: #330000;">✕ CANCEL</button>
                </div>
            </div>
            
            <div class="status" id="status">[connected to room]</div>
        </div>
        
        <div class="footer">
            [ANOM 1.5] // [REFRESH TO ERASE]
        </div>
    </div>

    <!-- Modal for full-size photo -->
    <div id="photoModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage">
    </div>

    <script>
        // Generate random username
        const username = 'user_' + Math.floor(Math.random() * 1000);
        document.getElementById('userDisplay').innerText = username;
        
        let currentRoom = null;
        let messages = [];
        let selectedPhotoData = null;
        let pollInterval = null;
        
        function joinRoom() {
            const room = document.getElementById('roomInput').value.trim();
            if (!room) {
                alert('enter room name');
                return;
            }
            
            currentRoom = room;
            
            // Hide note, show chat
            document.getElementById('note').style.display = 'none';
            document.getElementById('chatArea').style.display = 'block';
            
            // Clear messages
            document.getElementById('messages').innerHTML = '';
            messages = [];
            
            // Add system message
            addMessage('system', 'joined room: ' + room);
            addMessage('join', username + ' joined');
            
            // Clear any existing interval
            if (pollInterval) {
                clearInterval(pollInterval);
            }
            
            // Start checking for messages
            startPolling();
        }
        
        function startPolling() {
            pollInterval = setInterval(() => {
                if (!currentRoom) return;
                
                // Get messages from localStorage
                const stored = localStorage.getItem('room_' + currentRoom);
                if (stored) {
                    try {
                        const roomMessages = JSON.parse(stored);
                        
                        // Show new messages
                        roomMessages.forEach(msg => {
                            if (!messages.find(m => m.id === msg.id)) {
                                messages.push(msg);
                                displayMessage(msg);
                            }
                        });
                    } catch (e) {}
                }
            }, 2000);
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !currentRoom) return;
            
            // Create message
            const msg = {
                id: Date.now() + '_' + Math.random(),
                user: username,
                text: text,
                time: Date.now(),
                type: 'message'
            };
            
            // Save to localStorage
            saveMessage(msg);
            
            // Display
            messages.push(msg);
            displayMessage(msg);
            
            input.value = '';
        }
        
        function showFileInput() {
            document.getElementById('textInputContainer').style.display = 'none';
            document.getElementById('photoInputContainer').style.display = 'block';
        }
        
        function toggleTextInput() {
            document.getElementById('textInputContainer').style.display = 'block';
            document.getElementById('photoInputContainer').style.display = 'none';
            cancelPhoto();
        }
        
        function handlePhotoSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedPhotoData = e.target.result;
                document.getElementById('previewImage').src = selectedPhotoData;
                document.getElementById('photoPreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        function sendPhoto() {
            if (!selectedPhotoData || !currentRoom) return;
            
            // Create message with photo
            const msg = {
                id: Date.now() + '_' + Math.random(),
                user: username,
                photo: selectedPhotoData,
                time: Date.now(),
                type: 'photo'
            };
            
            // Save to localStorage
            saveMessage(msg);
            
            // Display
            messages.push(msg);
            displayMessage(msg);
            
            // Reset photo input
            cancelPhoto();
            toggleTextInput();
        }
        
        function cancelPhoto() {
            selectedPhotoData = null;
            document.getElementById('photoInput').value = '';
            document.getElementById('photoPreview').style.display = 'none';
        }
        
        function saveMessage(msg) {
            // Get existing messages for this room
            const key = 'room_' + currentRoom;
            const stored = localStorage.getItem(key);
            let roomMessages = [];
            
            if (stored) {
                try {
                    roomMessages = JSON.parse(stored);
                } catch (e) {}
            }
            
            // Add new message
            roomMessages.push(msg);
            
            // Keep only last 30 messages (reduced because photos are large)
            if (roomMessages.length > 30) {
                roomMessages = roomMessages.slice(-30);
            }
            
            // Save back
            localStorage.setItem(key, JSON.stringify(roomMessages));
        }
        
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            
            if (msg.type === 'join') {
                msgDiv.className = 'join-message';
                msgDiv.innerText = '➤ ' + (msg.text || msg.user + ' joined');
            } else if (msg.type === 'system') {
                msgDiv.className = 'join-message';
                msgDiv.style.color = '#666';
                msgDiv.innerText = '>>> ' + msg.text + ' <<<';
            } else if (msg.type === 'photo') {
                msgDiv.className = 'message';
                const time = new Date(msg.time).toLocaleTimeString();
                msgDiv.innerHTML = `<strong>[${msg.user}]</strong> ${time}<br>
                    <div class="message-content">
                        <img src="${msg.photo}" class="photo-message" onclick="openModal('${msg.photo}')">
                    </div>`;
            } else {
                msgDiv.className = 'message';
                const time = new Date(msg.time).toLocaleTimeString();
                msgDiv.innerHTML = `<strong>[${msg.user}]</strong> ${time}<br>
                    <div class="message-content">${escapeHtml(msg.text)}</div>`;
            }
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addMessage(type, text) {
            const msg = {
                id: Date.now() + '_' + Math.random(),
                type: type,
                text: text,
                user: type === 'message' ? username : 'system',
                time: Date.now()
            };
            
            messages.push(msg);
            displayMessage(msg);
            
            if (type === 'join') {
                saveMessage(msg);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Modal functions
        function openModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('photoModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }
        
        // Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
        });
    </script>
</body>
</html>
